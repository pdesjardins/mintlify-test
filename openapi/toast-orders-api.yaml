components:
  schemas:
    Order:
      allOf:
      - $ref: "#/components/schemas/ExternalReference"
      - properties:
          openedDate:
            description: "The business date of the order.\n\nFor dine-in and as soon\
              \ as possible (ASAP) orders, `openedDate` should match `createdDate`.\n\
              \nFor scheduled orders, `openedDate` should match `promisedDate`.\n\n\
              If you do not provide a value for \n`openedDate` value when you `POST`\
              \ a new order, the\nbusiness date of the order is set to the restaurant\n\
              business day that corresponds to the current date and\ntime.\n\nThe\
              \ business date of an order is affected by the\nbusiness date cutoff\
              \ time for a restaurant, which is\navailable from the restaurants API\
              \ in the `closeoutHour` property.\n"
            format: date-time
            type: string
          modifiedDate:
            description: "The most recent date that the order, or a check or menu\
              \ item selection in the order, was modified."
            format: date-time
            type: string
          promisedDate:
            description: |
              For scheduled orders, the date and time that the order is scheduled to be fulfilled.

              For dine-in and as soon as possible (ASAP) orders, `promisedDate` is `null`.
            format: date-time
            type: string
          channelGuid:
            description: |
              Reserved for future use.
            format: uuid
            type: string
          diningOption:
            $ref: "#/components/schemas/ExternalReference"
          checks:
            description: |
              The checks for this order. Most orders have one check.

              If the check is split, then there are multiple checks.
            items:
              $ref: "#/components/schemas/Check"
            minItems: 1
            type: array
          table:
            $ref: "#/components/schemas/ExternalReference"
          serviceArea:
            $ref: "#/components/schemas/ExternalReference"
          restaurantService:
            $ref: "#/components/schemas/ExternalReference"
          revenueCenter:
            $ref: "#/components/schemas/ExternalReference"
          source:
            description: |
              Indicates the way that the order was placed.

              Valid values:

              * `In Store`
              * `Online`
              * `Order-and-Pay-at-Table`
              * `API`
              * `Kiosk`
              * `Caller Id`
              * `Google`
              * `Invoice`
              * `Toast Pickup App`
              * `Toast Local`
              * `Branded Online Ordering`
              * `Catering`
              * `Catering Online Ordering`
              * `Toast Tables`
              * `eCommerce Online ordering`
              * `Branded Mobile App`
              * `Grubhub` (deprecated)

              Response only.
            type: string
            x-toast-read-only: true
          duration:
            description: The number of seconds between creation and payment. Response
              only.
            type: integer
            x-toast-read-only: true
          deliveryInfo:
            $ref: "#/components/schemas/DeliveryInfo"
          requiredPrepTime:
            description: "The amount of time that it will take to prepare the order.\
              \ This value overrides the \ndefault `deliveryPrepTime` or `takeoutPrepTime`\
              \ that normally controls auto-firing for scheduled orders.\n\nYou can\
              \ use `requiredPrepTime` to handle atypical orders that will take more\
              \ time than usual for a restaurant to prepare.\n\nExpress the required\
              \ preparation time in ISO-8601 duration format. Must be greater than\
              \ zero and be an \nincrement of five minutes. For example, the value\
              \ \"PT15M\" sets the required preparation time for the order to 15 minutes.\n"
            format: ISO-8601
            type: string
          estimatedFulfillmentDate:
            description: |
              The date and time that the order is expected to be ready for pickup or to be delivered.

              This value is only set when the order dining option uses the `DELIVERY` or `TAKE_OUT` dining behavior. For other dining options, the value is `null`.

              Response only.
            format: date-time
            type: string
            x-toast-read-only: true
          numberOfGuests:
            description: |
              The number of restaurant guests that are associated with the
              order. For example, for a dine-in order, this might be the
              number of guests at a table.
            type: integer
          voided:
            description: Set to `true` if this order was voided. Response only.
            type: boolean
            x-toast-read-only: true
          voidDate:
            description: The date on which this order was voided. Response only.
            format: date-time
            type: string
            x-toast-read-only: true
          voidBusinessDate:
            description: The business date (yyyyMMdd) on which this order was voided.
              Response only.
            type: integer
            x-toast-read-only: true
          paidDate:
            description: "The most recent date on which this order received payment.\
              \ If not specified when `POST`ing, it is set to the current system time."
            format: date-time
            type: string
          closedDate:
            description: |
              The most recent date on which the order payment status changed to `CLOSED`.

              This status is not returned for the order. The order is simply `CLOSED` when all of the checks on the order are `CLOSED`.
            format: date-time
            type: string
          deletedDate:
            description: |
              The date and time when the order was deleted.

              The `deletedDate` value only
              applies when the `deleted` value is `true`.

              If `deleted` is `false`, the value
              of `deletedDate` is the UNIX epoch, `1970-01-01T00:00:00.000+0000`.
            format: date-time
            type: string
          deleted:
            description: |
              Set to `true` if this order is deleted. Response only.

              For example, if you combine a
              check into another order, the original order for the check is deleted.
            type: boolean
            x-toast-read-only: true
          businessDate:
            description: The business date (yyyyMMdd) on which the order was fulfilled.
              Response only.
            type: integer
            x-toast-read-only: true
          server:
            $ref: "#/components/schemas/ExternalReference"
          pricingFeatures:
            description: Pricing features that this order is using.
            items:
              description: A specific pricing feature used to price out the order.
              enum:
              - TAXESV2
              - TAXESV3
              type: string
            type: array
          approvalStatus:
            description: |
              The current state of the order in the restaurant order
              fulfillment process. For example, the `approvalStatus`
              can indicate that an order is waiting for a restaurant
              employee to approve it or that the order is in a
              restaurant kitchen being fulfilled. Response only.

              Valid values:

              * `NEEDS_APPROVAL` - The order is created but will
              not be fulfilled by the restaurant until an employee
              approves it.

              * `APPROVED` - The order is being fulfilled by the
              restaurant or it was fulfilled in the past. Orders
              remain in this state indefinitely after they are
              fulfilled.

              * `FUTURE` - The order is expected to be fulfilled by the
              restaurant at a future date and time. Restaurant
              employees will receive information about the order at the
              date and time that it is ready to be fulfilled.

              * `NOT_APPROVED` - Restaurant employees received
              information about the order but did not approve it for
              fulfillment. An order enters this state after a period of
              time passes without a restaurant employee approving it.
            enum:
            - NEEDS_APPROVAL
            - APPROVED
            - FUTURE
            - NOT_APPROVED
            type: string
            x-toast-read-only: true
          createdDevice:
            $ref: "#/components/schemas/Device"
          createdDate:
            description: The date and time that the Toast platform received the order.
            format: date-time
            type: string
          lastModifiedDevice:
            $ref: "#/components/schemas/Device"
          curbsidePickupInfo:
            $ref: "#/components/schemas/CurbsidePickupInfo"
          marketplaceFacilitatorTaxInfo:
            $ref: "#/components/schemas/MarketplaceFacilitatorTaxInfo"
          createdInTestMode:
            description: |
              Indicates whether the order was created while the restaurant was
              in test mode.

              For more information, see [this _Toast Central_
              article](https://central.toasttab.com/s/article/Test-Mode-Enable-and-Disable-1492802389999)
            type: boolean
          appliedPackagingInfo:
            $ref: "#/components/schemas/AppliedPackagingInfo"
          excessFood:
            description: "Indicates whether the order was created to track excess\
              \ food (for example, food waste) rather than a \nstandard guest order.\
              \ Response only.\n\nFor more information on the differences between\
              \ guest orders and excess food orders, see \n[Daily order for tracking\
              \ excess food](https://doc.toasttab.com/doc/devguide/apiDailyOrderForTrackingExcessFood.html).\n"
            type: boolean
            x-toast-read-only: true
          displayNumber:
            description: "Response only. Generally starts at one each day and counts\
              \ up. Not guaranteed to be unique, can be empty if unset."
            type: string
            x-toast-read-only: true
        required:
        - checks
        - diningOption
        type: object

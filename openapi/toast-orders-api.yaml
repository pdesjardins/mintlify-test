    AppliedLoyaltyInfo:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - properties:
          loyaltyIdentifier:
            description: "An identifier for the loyalty program account. For `POST`\
              \ orders, this identifier is transmitted to the loyalty program service\
              \ provider to associate the check with the loyalty account."
            type: string
          maskedLoyaltyIdentifier:
            description: |
              A representation of the identifier of the loyalty program
              account that can be displayed securely. For example:
              `************1234`. The Toast POS displays this string to
              restaurant employees and guests.

              You can optionally include this
              value when you `POST` an order. It is
              available in response data when you `GET` the order.

              If you do not provide a `maskedLoyaltyIdentifier` when you
              `POST` an order, this value is `null` in response data.

              The Toast POS app displays a masked representation of the
              `loyaltyIdentifier`. All characters except the last four
              are hidden.
            type: string
          vendor:
            description: The specific loyalty program service provider that supports
              the loyalty account.
            enum:
            - TOAST
            - PUNCHH
            - PUNCHH2
            - PAYTRONIX
            - APPFRONT
            - INTEGRATION
            type: string
          accrualFamilyGuid:
            description: |
              Response only. An internal Toast platform identifier for loyalty
              program transactions.

              This is not returned from the initial
              `POST` order request and is available at a later time.
            type: string
            x-toast-read-only: true
          accrualText:
            description: |
              Response only. A description of the loyalty program transaction
              to print on the customer's receipt. For example,
              "Earned 27 points."

              The maximum length of the description string
              is 255 characters.

              This is not returned from the initial
              `POST` order request and is available at a later time.
            type: string
            x-toast-read-only: true
        type: object
      description: Information about the customer loyalty program account associated
        with a check.
      example:
        accrualFamilyGuid: accrualFamilyGuid
        entityType: entityType
        vendor: TOAST
        accrualText: accrualText
        guid: guid
        maskedLoyaltyIdentifier: maskedLoyaltyIdentifier
        loyaltyIdentifier: loyaltyIdentifier
    Selection:
      allOf:
      - $ref: "#/components/schemas/ExternalReference"
      - properties:
          item:
            $ref: "#/components/schemas/ConfigReference"
          itemGroup:
            $ref: "#/components/schemas/ConfigReference"
          optionGroup:
            $ref: "#/components/schemas/ConfigReference"
          preModifier:
            $ref: "#/components/schemas/ConfigReference"
          quantity:
            description: "Quantity ordered. For items sold by weight, a decimal number.\
              \ For discrete items, a counting number."
            format: double
            type: number
          seatNumber:
            description: |
              Indicates which guest seat at a restaurant table ordered
              a menu item selection. Restaurant employees can choose the
              seat number when they add a menu item to a guest check.

              * A positive integer value indicates the seat number for
                the menu item.

              * `0` - Indicates that the menu item is shared by
                multiple guests.

              * `-1` - Indicates that the restaurant employee did not
                select a seat for the menu item.

              Response only.
            type: integer
            x-toast-read-only: true
          unitOfMeasure:
            description: |
              The unit of measure used to weigh, determine size, or otherwise
              quantify the item.

              The default is `NONE`, which means that the item is not meant to
              be measured during a sale.

              Values are:
              * `NONE` - The item is not meant to be measured.
              * `LB` - Weighed in pounds.
              * `OZ` - Weighed in ounces.
              * `KG` - Weighed in kilograms.
              * `G` - Weighed in grams.
              * `GAL` - Measured in gallons.
              * `L` - Measured in liters.
              * `ML` - Measured in milliliters.
              * `FL_OZ` - Measured in fluid ounces.
              * `M` - Measured in meters.
              * `CM` - Measured in centimeters.
              * `FT` - Measured in feet.
              * `IN` - Measured in inches.
              * `YD` - Measured in yards.
            enum:
            - NONE
            - LB
            - OZ
            - KG
            - G
            - GAL
            - L
            - ML
            - FL_OZ
            - M
            - CM
            - FT
            - IN
            - YD
            type: string
          selectionType:
            description: |
              Specifies whether this selection is a special request or other off-menu sale.

              If `null` or `NONE`, describes a normal modifier or item selection.

              `TOAST_CARD_SELL` and `TOAST_CARD_RELOAD` are currently response-only.
            enum:
            - NONE
            - OPEN_ITEM
            - SPECIAL_REQUEST
            - PORTION
            - HOUSE_ACCOUNT_PAY_BALANCE
            - TOAST_CARD_SELL
            - TOAST_CARD_RELOAD
            type: string
          salesCategory:
            $ref: "#/components/schemas/ConfigReference"
          appliedDiscounts:
            description: The itemized discounts that are applied to this item. Response
              only.
            items:
              $ref: "#/components/schemas/AppliedDiscount"
            minItems: 0
            type: array
            x-toast-read-only: true
          deferred:
            description: "Whether this selection is a deferred revenue transaction,\
              \ such as a gift card sale."
            type: boolean
          preDiscountPrice:
            description: Gross sale price for this selection. Excludes tax. Response
              only.
            format: double
            type: number
            x-toast-read-only: true
          price:
            description: "Net price for this selection. The final price of the item\
              \ after considering discounts (including discounts at the check level),\
              \ quantity adjustments, and modifier prices at the time the item was\
              \ selected for purchase. Response only."
            format: double
            type: number
            x-toast-read-only: true
          tax:
            description: The total tax amount for this selection. Response only.
            format: double
            type: number
            x-toast-read-only: true
          voided:
            description: Set to `true` if this selection is voided. Response only.
            type: boolean
            x-toast-read-only: true
          voidDate:
            description: The date on which this selection was voided. Response only.
            format: date-time
            type: string
            x-toast-read-only: true
          voidBusinessDate:
            description: The business date (yyyyMMdd) on which this selection was
              voided. Response only.
            type: integer
            x-toast-read-only: true
          voidReason:
            $ref: "#/components/schemas/ExternalReference"
          refundDetails:
            $ref: "#/components/schemas/RefundDetails"
          displayName:
            description: |
              The display name of the selection.

              Can be used to set a special request value.

              Otherwise, it is generated from this selection's item property.
            type: string
          plu:
            description: The price look-up (PLU) code for the menu item selection
              used for pricing and inventory management.
            type: string
            x-toast-read-only: true
          premodifierPlu:
            description: The Price Look-Up (PLU) code for the premodifier associated
              with this menu item selection. This is a unique identifier used for
              pricing and inventory management purposes. Currently this field is read
              only.
            type: string
            x-toast-read-only: true
          createdDate:
            description: "The date on which this selection was created. If not specified,\
              \ defaults to the current time."
            format: date-time
            type: string
          modifiedDate:
            description: "The date on which this selection was last modified. If not\
              \ specified, defaults to the current time."
            format: date-time
            type: string
          modifiers:
            description: A list of modifiers that apply to this selection.
            items:
              $ref: "#/components/schemas/Selection"
            type: array
          fulfillmentStatus:
            default: NEW
            description: |
              Indicates the stage of the preparation workflow that the
              menu item selection is in.

              The `fulfillmentStatus` of a
              menu item selection changes as restaurant employees move
              the item through the functions of the Toast POS, for
              example order entry and the kitchen display system (KDS).
              Response only.

              Valid values:

              * `NEW` - The menu item selection was added to a
                check but is not yet sent to the KDS for
                preparation.

              * `HOLD` - A restaurant employee paused the menu
                item selection so that it does not appear in the
                KDS for preparation.

              * `SENT` - The menu item selection was fired and
                appears in the KDS for preparation.

              * `READY` - Preparation is complete. The menu item
                selection is fulfilled and no longer appears in
                the KDS. If your restaurant does not use the Toast platform
                KDS, then order items do not reach the `READY`
                status.
            enum:
            - NEW
            - HOLD
            - SENT
            - READY
            type: string
            x-toast-read-only: true
          fulfillment:
            $ref: "#/components/schemas/Fulfillment"
          taxInclusion:
            description: |
              Indicates whether the menu item price includes one or more tax
              amounts. If the menu item is a modifier for another menu item
              selection, it always inherits the tax inclusion behavior of the menu
              item that it applies to.

              Valid values:
              * `INCLUDED` - The menu item price includes one or more tax amounts.
              * `NOT_INCLUDED` - The menu item price does not include any tax
                amounts.
              * `INHERITED` - The menu item is a modifier for another menu item
                selection in the check. The `taxInclusion` value of the parent menu
                item selection applies to the modifier. If a menu item selection
                *that is not a modifier* inherits tax inclusion behavior from a
                menu or menu group, the `taxInclusion` value is either
                `INCLUDED` or `NOT_INCLUDED`.
            enum:
            - INCLUDED
            - NOT_INCLUDED
            - INHERITED
            type: string
          appliedTaxes:
            description: An array of `AppliedTaxRate` objects that contain information
              about tax payments made for the selection. Response only.
            items:
              $ref: "#/components/schemas/AppliedTaxRate"
            type: array
            x-toast-read-only: true
          diningOption:
            $ref: "#/components/schemas/ExternalReference"
          openPriceAmount:
            description: |
              A non-negative currency amount that sets the price of a
              menu item that is configured to use the *Open Price*
              pricing strategy. If you do not supply an
              `openPriceAmount` value for an open price menu item, the
              orders API sets the price to 0.00.

              If a menu item is configured to use tax-inclusive
              pricing, the orders API calculates the base price and tax
              amount based on the open price that you specify. _The
              open-price amount includes both the base-price and
              inclusive tax amount._

              `POST` only. The `openPriceAmount` value is not
              present in orders API return data. It is used to
              populate `receiptLinePrice`.
            format: double
            type: number
          receiptLinePrice:
            description: "The price of the menu item selection without any quantity,\
              \ taxes, \ndiscounts, and modifier adjustments. If the menu item has\
              \ taxes included, the `receiptLinePrice` value shows the original price,\
              \ including taxes.\n\nFor example, if the menu item selection is for\
              \ two orders of fries, \n`receiptLinePrice` is the price of one order\
              \ of fries. If a menu item selection \nis for three large drinks, receiptLinePrice\
              \ is the price of one large drink.\n\nPopulated based on the menu configuration,\
              \ or using the value provided in \n`externalPriceAmount` or `openPriceAmount`.\n"
            format: double
            type: number
          optionGroupPricingMode:
            description: Information about how the modifier group affects the pricing
              of its parent item.
            enum:
            - INCLUDED
            - FIXED_PRICE
            - ADJUSTS_PRICE
            - REPLACES_PRICE
            - LOCATION_SPECIFIC_PRICE
            type: string
          externalPriceAmount:
            description: |
              The menu item price that was calculated by the
              marketplace facilitator organization that created the
              order.

              `POST` only. The orders API does not include the
              `externalPriceAmount` value in return data. It is
              used to populate `receiptLinePrice`.

              **Note**: you can only include this information if your
              Toast API client is associated with a designated
              marketplace facilitator organization. Most Toast API
              clients do not create marketplace facilitator orders.
            format: double
            type: number
          splitOrigin:
            $ref: "#/components/schemas/ExternalReference"
        required:
        - item
        - quantity
        type: object
      description: |
        A `Selection` object can represent either a primary item (for example,
        `Check.selections`) or a modifier (`Selection.modifiers`) selection.
        Quantity defaults to `1`.

        For a `POST` operation, all selections must have valid `item` and
        `itemGroup` fields. The `item` and `itemGroup` values can be `null` for
        `GET` requests. For example, they are `null` for gift cards and on special
        requests.

        To specify a modifier selection, add it to the `modifiers` list of
        another selection. Each modifier selection must have its `optionGroup` field
        set correctly, because a `MenuItem` can be included in multiple
        `MenuOptionGroups`, potentially with different prices or sizing.

        The `externalId` value for a selection must be unique. If you submit a
        selection with an `externalId` that already exists for another selection,
        the request will fail. You can use this behavior to implement idempotent
        selection submission by always providing a consistent `externalId` for
        each unique selection attempt.
      example:
        deferred: true
        preDiscountPrice: 7.061401241503109
        voidReason:
          entityType: entityType
          guid: guid
          externalId: externalId
        optionGroup:
          entityType: entityType
          guid: guid
          externalId: externalId
          multiLocationId: multiLocationId
        displayName: displayName
        appliedDiscounts:
        - approver:
            entityType: entityType
            guid: guid
            externalId: externalId
          loyaltyDetails:
            vendor: TOAST
            referenceId: referenceId
          discountPercent: 2.3021358869347655
          entityType: entityType
          appliedDiscountReason:
            name: name
            description: description
            discountReason:
              entityType: entityType
              guid: guid
            comment: comment
          comboItems:
          - entityType: entityType
            guid: guid
            externalId: externalId
          - entityType: entityType
            guid: guid
            externalId: externalId
          externalId: externalId
          discountAmount: 1.4658129805029452
          discount:
            entityType: entityType
            guid: guid
          triggers:
          - quantity: 5.637376656633329
            selection:
              entityType: entityType
              guid: guid
              externalId: externalId
          - quantity: 5.637376656633329
            selection:
              entityType: entityType
              guid: guid
              externalId: externalId
          appliedPromoCode: appliedPromoCode
          processingState: PENDING_APPLIED

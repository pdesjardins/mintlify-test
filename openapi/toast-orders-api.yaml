      properties:
        address1:
          description: |
            The first line of the street address of the delivery destination.
          type: string
        address2:
          description: |
            The second line of the street address of the delivery destination.
          type: string
        city:
          description: |
            The name of the city or town of the delivery destination.
          type: string
        administrativeArea:
          description: "The geographic or government division, larger than a city/town,\
            \ for\nthe delivery destination. For example, the name of a province,\
            \ county,\nregion, or state might be the `administrativeArea` value for\
            \ a\ndelivery address. This value is optional, not all delivery addresses\n\
            include a regional area name other than a `city`. If you include the \n\
            `state` value, you would typically _not_ include an `administrativeArea`.\n"
          type: string
        state:
          description: |
            The postal abbreviation of the state or province of the
            delivery destination.

            The abbreviation must be in ISO 3166-2
            format (two capital letters).

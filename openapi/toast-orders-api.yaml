    Check:
      allOf:
      - $ref: "#/components/schemas/ExternalReference"
      - properties:
          createdDate:
            description: The date and time that the Toast platform received the check.
            format: date-time
            type: string
          openedDate:
            description: "The date on which this check was opened. If not specified,\
              \ it is set to the current system time."
            format: date-time
            type: string
          closedDate:
            description: The most recent date on which this check's payment status
              was set to `CLOSED`.
            format: date-time
            type: string
          modifiedDate:
            description: The most recent date on which this check was modified.
            format: date-time
            type: string
          deletedDate:
            description: |
              The date on which this check was deleted.

              `deletedDate` is only applicable when `deleted` is true.

              If `deleted` is false, then `deletedDate` is set to the UNIX epoch, `1970-01-01T00:00:00.000+0000`.
            format: date-time
            type: string
          deleted:
            description: Set to `true` if this check was deleted.
            type: boolean
          selections:
            items:
              $ref: "#/components/schemas/Selection"
            type: array
          customer:
            $ref: "#/components/schemas/Customer"
          appliedLoyaltyInfo:
            $ref: "#/components/schemas/AppliedLoyaltyInfo"
          taxExempt:
            default: false
            description: Set to `true` if this check is tax exempt.
            type: boolean
          displayNumber:
            description: Generally starts at one each day and counts up. The Toast
              platform fills this in if it is not specified when the order is POSTed.
              Not guaranteed to be unique.
            type: string
          appliedServiceCharges:
            description: Any restaurant-configured service charges that applied to
              this check.
            items:
              $ref: "#/components/schemas/AppliedServiceCharge"
            type: array
          amount:
            description: The total calculated price of the check including discounts
              and service charges. The `amount` does not include gratuity or taxes.
              Response only.
            format: double
            type: number
            x-toast-read-only: true
          taxAmount:
            description: The calculated tax amount. Includes service charge and item
              level taxes. Response only.
            format: double
            type: number
            x-toast-read-only: true
          totalAmount:
            description: The total calculated price of this check including discounts
              and taxes. Not affected by refunds.
            format: double
            type: number
          payments:
            description: Payments made on this check.
            items:
              $ref: "#/components/schemas/Payment"
            minItems: 0
            type: array
          tabName:
            description: |
              The name of the tab on this check. This displays on the KDS (Kitchen Display System) for pending orders.

              The `tabName` value can contain up to 255 characters.
            type: string
          paymentStatus:
            description: |
              The payment status of this check.

              Valid values:

              * `OPEN` - There is an outstanding balance.

              * `PAID` - A credit card payment was applied, but the tip has not been adjusted.

              * `CLOSED`  - There is no remaining amount due on this check. For credit card payments, the payment has been adjusted to reflect the tip. Toast does not prevent a `CLOSED` check from transitioning back to `OPEN` or `PAID`.

              Response only.
            enum:
            - OPEN
            - PAID
            - CLOSED
            type: string
            x-toast-read-only: true
          appliedDiscounts:
            description: "The discounts applied to this check. In a `POST` request,\
              \ only one `appliedDiscount` is allowed per check."
            items:
              $ref: "#/components/schemas/AppliedDiscount"
            minItems: 0
            type: array
          voided:
            description: True if this check is voided. Response only.
            type: boolean
            x-toast-read-only: true
          voidDate:
            description: The date when this check was voided. Response only.
            format: date-time
            type: string
            x-toast-read-only: true
          voidBusinessDate:
            description: The business date (yyyyMMdd) on which this check was voided.
              Response only.
            type: integer
            x-toast-read-only: true
          paidDate:
            description: "The most recent date when this check received payment. If\
              \ not specified when `POST`ing, it is set to the current system time."
            format: date-time
            type: string
          createdDevice:
            $ref: "#/components/schemas/Device"
          lastModifiedDevice:
            $ref: "#/components/schemas/Device"
          duration:
            description: The number of seconds between creation and payment. Response
              only.
            type: integer
            x-toast-read-only: true
          openedBy:
            $ref: "#/components/schemas/ExternalReference"
        required:
        - selections
        type: object

components:
  schemas:
    AlternatePaymentType:
      allOf:
      - $ref: "#/components/schemas/ExternalReference"
      - properties:
          name:
            description: The name of the alternate payment type.
            type: string
        type: object
      example:
        entityType: entityType
        name: name
        guid: guid
        externalId: externalId
    BreakType:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - properties:
          name:
            description: |
              The name of the work break type, as recognized by
              restaurant employees.
            type: string
          active:
            description: |
              Indicates whether the break is available and can be taken
              by restaurant employees.
            type: boolean
          paid:
            description: Indicates whether the break is paid.
            type: boolean
          duration:
            description: The duration of the break in minutes.
            type: integer
          enforceMinimumTime:
            description: |
              Indicates whether the duration is enforced as the minimum
              time for the break.
            type: boolean
          trackMissedBreaks:
            description: |
              True if breaks that are not taken within the specified break
              interval should be generated in Toast.
            type: boolean
          breakIntervalHrs:
            description: |
              The number of hours between break intervals. Break intervals
              are specified in hours and minutes. If missed breaks are not
              tracked, this value may be null.
            type: integer
          breakIntervalMins:
            description: |
              The number of minutes between break intervals. Break intervals
              are specified in hours and minutes. If missed breaks are not
              tracked, this value may be null.
            type: integer
          trackBreakAcknowledgement:
            description: |
              Indicates whether break acknowledgements are collected for
              this type of break. Break acknowledgements will not be
              collected if `trackMissedBreaks` is false.
            type: boolean
        type: object
      example:
        duration: 0
        entityType: entityType
        trackMissedBreaks: true
        name: name
        paid: true
        guid: guid
        active: true
        breakIntervalHrs: 6
        breakIntervalMins: 1
        trackBreakAcknowledgement: true
        enforceMinimumTime: true
    CashDrawer:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - properties:
          printer:
            $ref: "#/components/schemas/ToastReference"
        type: object
      example:
        entityType: entityType
        printer:
          entityType: entityType
          guid: guid
        guid: guid
    DiningOption:
      allOf:
      - $ref: "#/components/schemas/ExternalReference"
      - properties:
          name:
            description: The name of the dining option.
            type: string
          behavior:
            description: |
              The behavior of the dining option. `TAKE_OUT` and
              `DELIVERY` require a `customer` to be specified on the
              order, and `DELIVERY` requires a `deliveryInfo` value.
            enum:
            - DINE_IN
            - TAKE_OUT
            - DELIVERY
            type: string
          curbside:
            description: |
              Indicates whether the dining option has curbside behavior, and allows the guest to
              provide identifying information such as a description of their vehicle.
            type: boolean
        type: object
      example:
        entityType: entityType
        name: name
        guid: guid
        externalId: externalId
        curbside: true
        behavior: DINE_IN
    Discount:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - description: |
          A discount configured in Toast Web.
          Discounts are always applied before taxes, but after
          service charges are calculated.
        properties:
          name:
            description: The human-readable name of the discount.
            type: string
          active:
            description: |
              Indicates whether the discount is available and can be
              applied by restaurant employees.
            type: boolean
          type:
            description: |
              * `PERCENT` - the discount reduces the price by a
              preconfigured percent.
              * `FIXED` - the discount reduces the price by a
              preconfigured currency amount.
              * `OPEN_PERCENT` - the discount reduces the price by a
              percent entered by a restaurant employee.
              * `OPEN_FIXED` - the discount reduces the price by a
              currency amount entered by a restaurant employee.
              * `BOGO` - a buy one get one (BOGO) discount.
              * `FIXED_TOTAL` - a combo discount that reduces the
              price of all eligible items to a preconfigured currency
              amount.
            enum:
            - PERCENT
            - FIXED
            - OPEN_PERCENT
            - OPEN_FIXED
            - BOGO
            - FIXED_TOTAL
            type: string
          percentage:
            description: |
              Percent discount applied when the `amountType` is
              `PERCENT`. This value will be greater than 0 and at
              most 100.
            format: double
            type: number
          amount:
            description: |
              The currency amount of the discount when the
              `amountType` is `FIXED`. This value will be greater
              than 0.
            format: double
            type: number
          selectionType:
            description: |
              * `CHECK` - the discount can be applied to a check.
              * `BOGO` - a buy one get one (BOGO) discount.
              * `ITEM` - the discount can be applied to an item
              selection in a check.
            enum:
            - CHECK
            - ITEM
            - BOGO
            type: string
          nonExclusive:
            description: |
              Indicates whether you can apply the discount with other
              discounts. This value is always `false` for item and
              combo discounts. Set this value for check and BOGO
              discounts by selecting **Allow with other discounts** in
              the **Discounts Rules** section of the discounts
              configuration page of Toast Web.
            type: boolean
          itemPickingPriority:
            description: |
              Indicates which menu item selections are discounted
              when you apply a BOGO discount. An item that is
              discounted by a BOGO discount is a "get" item.

              * `FIRST` - the BOGO discount applies to the first
              matching item selection in the check or the discount is
              not a BOGO discount.

              * `LEAST_EXPENSIVE` - the BOGO discount applies
              to the least expensive matching item selection in the check.
              `LEAST_EXPENSIVE` is the default `itemPickingPriority` value
              for discounts that are not BOGO discounts.

              * `MOST_EXPENSIVE` - the BOGO discount applies to the most
              expensive matching item selection in the check.
            enum:
            - FIRST
            - LEAST_EXPENSIVE
            - MOST_EXPENSIVE
            type: string
          fixedTotal:
            description: |
              The total price of items discounted by a combo
              discount. This value is `null` for discounts that are
              not combo discounts.
            format: double
            type: number
          promoCodes:
            description: |
              A list of promotion identifiers associated with this discount.
            items:
              $ref: "#/components/schemas/PromoCode"
            type: array
        type: object
      example:
        amount: 6.027456183070403
        selectionType: CHECK
        promoCodes:
        - code: code
          entityType: entityType
          name: name
          guid: guid
          usageType: SINGLE_USE_PHONE
        - code: code
          entityType: entityType
          name: name
          guid: guid
          usageType: SINGLE_USE_PHONE
        entityType: entityType
        nonExclusive: true
        percentage: 0.8008281904610115
        name: name
        guid: guid
        active: true
        itemPickingPriority: FIRST
        type: PERCENT
        fixedTotal: 1.4658129805029452
    PromoCode:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - description: |
          Information about a promotion, associated with a discount.
        properties:
          code:
            description: The identifier of the promotion. Guests enter the code to
              apply the discount.
            type: string
          name:
            description: The human-readable name of the promotion.
            type: string
          usageType:
            description: |
              Indicates how the promo code can be used.
              * `SINGLE_USE_PHONE` - the promo code can only be used once per phone number. Some promotional discounts require a guest's phone number when applying the promo code.
              * `SINGLE_USE_UNIQUE_CODE` - the promo code is a unique code that can only be used once.
              * `MULTI_USE` - the promo code can be used multiple times.
            enum:
            - SINGLE_USE_PHONE
            - SINGLE_USE_UNIQUE_CODE
            - MULTI_USE
            type: string
        type: object
      example:
        code: code
        entityType: entityType
        name: name
        guid: guid
        usageType: SINGLE_USE_PHONE
    Menu:
      allOf:
      - $ref: "#/components/schemas/ExternalReference"
      - properties:
          name:
            description: |
              The name of the menu as it appears in the Toast POS.
            type: string
          orderableOnline:
            description: |
              Deprecated. Indicates whether restaurant guests can order from the menu online.

              Use the `visibility` array that the menus API (V2) returns for each menu entity, instead of this
              `orderableOnline` value, to determine if the entity should be
              available for online ordering.
            type: string
          visibility:
            description: |
              Deprecated. Indicates where the menu is displayed and who can see it.
              * ALL: Visible to everyone (servers and customers)
              * POS_ONLY: Only visible to servers
              * NONE: Hidden from everyone

              Use the `visibility` array that the menus API (V2) returns for each menu
              entity, instead of this `visibility` value, to determine where the
              entity should be visible.
            enum:
            - ALL
            - POS_ONLY
            - NONE
            type: string
          groups:
            description: |
              An array of the `MenuGroup` objects
              that are part of this menu.
            items:
              $ref: "#/components/schemas/ExternalReference"
            minItems: 0
            type: array
          images:
            description: A collection of images associated with the menu.
            items:
              $ref: "#/components/schemas/Image"
            type: array
          unitOfMeasure:
            description: |
              The unit of measure used to determine the price of items in this menu. For example, $10.00 per gram.

              The default is `NONE`, which means that the item is not meant to
              be measured during a sale.

              Values are:
              * `NONE` - The item is not meant to be measured.
              * `LB` - Weighed in pounds.
              * `OZ` - Weighed in ounces.
              * `KG` - Weighed in kilograms.
              * `G` - Weighed in grams.
              * `GAL` - Measured in gallons.
              * `L` - Measured in liters.
              * `ML` - Measured in milliliters.
              * `FL_OZ` - Measured in fluid ounces.
              * `M` - Measured in meters.
              * `CM` - Measured in centimeters.
              * `FT` - Measured in feet.
              * `IN` - Measured in inches.
              * `YD` - Measured in yards.
            enum:
            - NONE
            - LB
            - OZ
            - KG
            - G
            - GAL
            - L
            - ML
            - FL_OZ
            - M
            - CM
            - FT
            - IN
            - YD
            type: string
        type: object
      example:
        images:
        - url: url
        - url: url
        visibility: ALL
        unitOfMeasure: NONE
        entityType: entityType
        orderableOnline: orderableOnline
        name: name
        guid: guid
        externalId: externalId
        groups:
        - entityType: entityType
          guid: guid
          externalId: externalId
        - entityType: entityType
          guid: guid
          externalId: externalId
    MenuItem:
      allOf:
      - $ref: "#/components/schemas/ExternalReference"
      - properties:
          name:
            description: |
              The name of the menu item as it appears in the Toast POS.
            type: string
          calories:
            description: |
              The amount of food energy in the item, expressed in
              Calorie units. Values can be positive, negative, or zero.
            type: integer
          sku:
            description: The stock keeping unit (SKU) code for the item.
            type: string
          plu:
            description: The price look up (PLU) code for the item.
            type: string
          orderableOnline:
            description: |
              Deprecated. Indicates whether restaurant guests can order from the menu online.

              Use the `visibility` array that the menus API (V2) returns for each menu entity, instead of this
              `orderableOnline` value, to determine if the entity should be
              available for online ordering.
            type: string
          visibility:
            description: |
              Deprecated. Indicates where the menu is displayed and who can see it.
              * ALL: Visible to everyone (servers and customers)
              * POS_ONLY: Only visible to servers
              * NONE: Hidden from everyone

              Use the `visibility` array that the menus API (V2) returns for each menu
              entity, instead of this `visibility` value, to determine where the
              entity should be visible.
            enum:
            - ALL
            - POS_ONLY
            - NONE
            type: string
          type:
            description: |
              Specifies whether this item is a special request or other
              off-menu transaction.
              * `NONE` - a normal menu item or modifier.
              * `OPEN_ITEM` - an item that is not on a menu.
              * `SPECIAL_REQUEST` - a selection that is not an item.
              * `PORTION` - a division of a menu item used to apply modifiers separately to separate parts of an item. For example, one half of a pizza.
            enum:
            - NONE
            - OPEN_ITEM
            - SPECIAL_REQUEST
            - PORTION
            type: string
          optionGroups:
            description: |
              An array of `ExternalReference` objects containing the
              identifiers of the `MenuOptionGroup`s
              that contain modifiers applicable to this item. Does not
              include those inherited from the parent `MenuGroup`.
            items:
              $ref: "#/components/schemas/ExternalReference"
            minItems: 0
            type: array
          inheritOptionGroups:
            description: |
              True if this menu item inherits `MenuOptionGroup`s
              from its parent `MenuGroup`.
            type: boolean
          images:
            description: |
              An array of `Image`
              objects that are associated with the `MenuItem`.
            items:
              $ref: "#/components/schemas/Image"
            type: array
          unitOfMeasure:
            description: |
              The unit of measure used to determine the price of the item.
              The default is NONE, which means that the item is not meant to
              be measured during a sale.
              This value is not relevant if `inheritUnitOfMeasure` is true.

              Values are:
              * `NONE` - The item is not meant to be measured.
              * `LB` - Weighed in pounds.
              * `OZ` - Weighed in ounces.
              * `KG` - Weighed in kilograms.
              * `G` - Weighed in grams.
              * `GAL` - Measured in gallons.
              * `L` - Measured in liters.
              * `ML` - Measured in milliliters.
              * `FL_OZ` - Measured in fluid ounces.
              * `M` - Measured in meters.
              * `CM` - Measured in centimeters.
              * `FT` - Measured in feet.
              * `IN` - Measured in inches.
              * `YD` - Measured in yards.
            enum:
            - NONE
            - LB
            - OZ
            - KG
            - G
            - GAL
            - L
            - ML
            - FL_OZ
            - M
            - CM
            - FT
            - IN
            - YD
            type: string
          inheritUnitOfMeasure:
            description: |
              True if this menu item inherits its unit of measure
              from its parent `MenuGroup`.
            type: boolean
        type: object
      example:
        images:
        - url: url
        - url: url
        visibility: ALL
        unitOfMeasure: NONE
        entityType: entityType
        externalId: externalId
        optionGroups:
        - entityType: entityType
          guid: guid
          externalId: externalId
        - entityType: entityType
          guid: guid
          externalId: externalId
        calories: 0
        type: NONE
        inheritUnitOfMeasure: true
        inheritOptionGroups: true
        orderableOnline: orderableOnline
        name: name
        plu: plu
        guid: guid
        sku: sku
    MenuGroup:
      allOf:
      - $ref: "#/components/schemas/ExternalReference"
      - properties:
          name:
            description: The name of the menu group as it appears in the Toast POS.
            type: string
          menu:
            $ref: "#/components/schemas/ExternalReference"
          orderableOnline:
            description: |
              Deprecated. Indicates whether restaurant guests can order from the menu online.

              Use the `visibility` array that the menus API (V2) returns for each menu entity, instead of this
              `orderableOnline` value, to determine if the entity should be
              available for online ordering.
            type: string
          visibility:
            description: |
              Deprecated. Indicates where the menu is displayed and who can see it.
              * ALL: Visible to everyone (servers and customers)
              * POS_ONLY: Only visible to servers
              * NONE: Hidden from everyone

              Use the `visibility` array that the menus API (V2) returns for each menu
              entity, instead of this `visibility` value, to determine where the
              entity should be visible.
            enum:
            - ALL
            - POS_ONLY
            - NONE
            type: string
          parent:
            $ref: "#/components/schemas/ExternalReference"
          items:
            description: |
              An array of `ExternalReference` objects containing the
              identifiers of the `MenuItem`s in the menu
              group.
            items:
              $ref: "#/components/schemas/ExternalReference"
            minItems: 0
            type: array
          subgroups:
            description: |
              An array of `ExternalReference` objects containing the
              identifiers of the child `MenuGroup`s in
              the menu group. Empty if the menu group does not include any child
              menu groups.
            items:
              $ref: "#/components/schemas/ExternalReference"
            minItems: 0
            type: array
          optionGroups:
            description: |
              An array of `ExternalReference` objects containing the
              identifiers of the child `MenuOptionGroup`s
              that contain modifiers applicable to the group, its
              subgroups and its items. Does not include
              `MenuOptionGroup`s inherited from its parent `MenuGroup`.
            items:
              $ref: "#/components/schemas/ExternalReference"
            minItems: 0
            type: array
          inheritOptionGroups:
            description: |
              True if this `MenuGroup` inherits `MenuOptionGroup`s
              from its parent `MenuGroup`.
            type: boolean
          images:
            description: |
              An array of `Image`
              objects associated with with the `MenuGroup`.
            items:
              $ref: "#/components/schemas/Image"
            type: array
          unitOfMeasure:
            description: |
              The unit of measure used to determine the price of items in this group.

              The default is `NONE`, which means that the item is not meant to
              be measured during a sale.
              This value is not relevant if `inheritUnitOfMeasure` is true.

              Values are:
              * `NONE` - The item is not meant to be measured.
              * `LB` - Weighed in pounds.
              * `OZ` - Weighed in ounces.
              * `KG` - Weighed in kilograms.
              * `G` - Weighed in grams.
              * `GAL` - Measured in gallons.
              * `L` - Measured in liters.
              * `ML` - Measured in milliliters.
              * `FL_OZ` - Measured in fluid ounces.
              * `M` - Measured in meters.
              * `CM` - Measured in centimeters.
              * `FT` - Measured in feet.
              * `IN` - Measured in inches.
              * `YD` - Measured in yards.
            enum:
            - NONE
            - LB
            - OZ
            - KG
            - G
            - GAL
            - L
            - ML
            - FL_OZ
            - M
            - CM
            - FT
            - IN
            - YD
            type: string
          inheritUnitOfMeasure:
            description: |
              True if this `MenuGroup` inherits its unit of measure
              from its parent `MenuGroup` or (if its parent is null)
              its parent `Menu`.
            type: boolean
        type: object
      example:
        parent:
          entityType: entityType
          guid: guid
          externalId: externalId
        images:
        - url: url
        - url: url
        visibility: ALL
        unitOfMeasure: NONE
        entityType: entityType
        externalId: externalId
        optionGroups:
        - entityType: entityType
          guid: guid
          externalId: externalId
        - entityType: entityType
          guid: guid
          externalId: externalId
        menu:
          entityType: entityType
          guid: guid
          externalId: externalId
        inheritUnitOfMeasure: true
        subgroups:
        - entityType: entityType
          guid: guid
          externalId: externalId
        - entityType: entityType
          guid: guid
          externalId: externalId
        inheritOptionGroups: true
        orderableOnline: orderableOnline
        name: name
        guid: guid
        items:
        - entityType: entityType
          guid: guid
          externalId: externalId
        - entityType: entityType
          guid: guid
          externalId: externalId
    MenuOptionGroup:
      allOf:
      - $ref: "#/components/schemas/ExternalReference"
      - properties:
          name:
            description: The name of the `MenuOptionGroup` as it appears in the Toast
              POS.
            type: string
          options:
            description: |
              An array of `ExternalReference` objects containing the
              identifiers of the `MenuItem`s in
              the menu group.
            items:
              $ref: "#/components/schemas/ExternalReference"
            minItems: 0
            type: array
          minSelections:
            description: The minimum number of selections that must be made from this
              option group.
            format: integer
            type: number
          maxSelections:
            description: The maximum number of selections that can be made from this
              option group.
            format: integer
            type: number
        type: object
      example:
        entityType: entityType
        name: name
        options:
        - entityType: entityType
          guid: guid
          externalId: externalId
        - entityType: entityType
          guid: guid
          externalId: externalId
        guid: guid
        externalId: externalId
        minSelections: 0.8008281904610115
        maxSelections: 6.027456183070403
    PreModifier:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - properties:
          name:
            description: The name of the pre modifier that appears in the Toast POS.
            type: string
          scalePrice:
            description: "True if this multiplies the modifier price, false if it\
              \ adds to the modifier price."
            type: boolean
          basePrice:
            description: "Amount to add to the modifier price, if scalePrice is false.\
              \ Otherwise not used."
            format: double
            type: number
          scaleFactor:
            description: "Amount to multiply the modifier price, if scalePrice is\
              \ true. Otherwise not used."
            format: float
            type: number
          displayMode:
            description: |
              Where this premodifier should be displayed relative to the modifier name.
              PREFIX - before the modifier name
              SUFFIX - after the modifier name
            enum:
            - PREFIX
            - SUFFIX
            type: string
          parent:
            $ref: "#/components/schemas/ToastReference"
          chargeAsExtra:
            description: |
              When true, selecting this pre-modifier adds an additional portion of the modifier to the menu item and adds the price of the additional portion to the menu item according to the rules listed below.

              If the modifier group that the modifier belongs to:
              * Uses the **No charge** option, the Toast platform uses the modifier's <a href="https://doc.toasttab.com/doc/platformguide/adminPricingModifierOptions.html#adminBasingModifierOptionsOnExistingMenuItems">override price</a> or, if no override price exists, the <a href="https://doc.toasttab.com/doc/platformguide/adminPricingModifierOptions.html#adminUnderstandingAModifierOptionsItemReference">item reference</a> price as the price of the additional portion.
              * Uses the **Individual** option where each modifier has its own price, the Toast platform uses the modifier's override price or, if no override price exists, the item reference price as the price of the additional portion.
              * Uses the **Group** option where all modifiers in the group share a price, the Toast platform uses the group price as the price of the additional portion.

              Additionally, if the modifier group that the modifier belongs to uses:
              * <a href="https://doc.toasttab.com/doc/platformguide/adminSizePrice.html#adminSizePricingForModifierGroups">Size</a> pricing, the Toast platform uses the size price that matches the size of the menu item when determining the price of the additional portion.
              * <a href="https://doc.toasttab.com/doc/platformguide/adminSequencePrice.html">Sequence</a> pricing, the Toast platform treats the additional portion as the next modifier in the sequence and prices it using the sequence pricing rules that have been specified.
              * <a href="https://doc.toasttab.com/doc/platformguide/adminSizeSequencePrice.html">Size/sequence</a> pricing, the Toast platform matches the size of the additional portion to the size of the menu item and then treats it as the next modifier in the sequence when determining the price of the additional portion.

              The `chargeAsExtra` value is `null` if the value is not set.
            nullable: true
            type: boolean
        type: object
      example:
        parent:
          entityType: entityType
          guid: guid
        scalePrice: true
        chargeAsExtra: true
        entityType: entityType
        scaleFactor: 6.0274563
        name: name
        guid: guid
        displayMode: PREFIX
        basePrice: 0.8008281904610115
    PreModifierGroup:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - properties:
          name:
            description: The name of the pre modifier that appears in the Toast POS.
            type: string
          isDefault:
            description: |
              True if this PreModifierGroup is set as the default Group.
              Only a single PreModifierGroup can be set as default at one time.
            type: boolean
        type: object
      example:
        isDefault: true
        entityType: entityType
        name: name
        guid: guid
    NoSaleReason:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - properties:
          name:
            description: The name of the no sale reason that appears in the Toast
              POS.
            type: string
        type: object
      example:
        entityType: entityType
        name: name
        guid: guid
    PayoutReason:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - properties:
          name:
            description: The short name of this payout reason.
            type: string
        type: object
      example:
        entityType: entityType
        name: name
        guid: guid
    PriceGroup:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - properties:
          name:
            description: The name of this price group.
            type: string
        type: object
      example:
        entityType: entityType
        name: name
        guid: guid
    Printer:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - properties:
          name:
            description: The name of this printer.
            type: string
        type: object
      example:
        entityType: entityType
        name: name
        guid: guid
    RestaurantService:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - properties:
          name:
            description: |
              The name of this meal service (for example, `Lunch` or
              `Dinner`).
            type: string
        type: object
      example:
        entityType: entityType
        name: name
        guid: guid
    RevenueCenter:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - description: "A set of ServiceAreas and POS devices for which separate revenue\
          \ reports can be generated. For instance, a restaurant with a bar might\
          \ choose to define two RevenueCenters, one for the bar and one for the dining\
          \ area."
        properties:
          name:
            description: The name of this revenue center.
            type: string
          description:
            description: The description of this revenue center.
            type: string
        type: object
      example:
        entityType: entityType
        name: name
        guid: guid
        description: description
    SalesCategory:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - description: "A set of items that will be grouped together in sales reports.\
          \ SalesCategories can be applied at any level, from entire menus to individual\
          \ menu items."
        properties:
          name:
            description: The name of this sales category.
            type: string
        type: object
      example:
        entityType: entityType
        name: name
        guid: guid
    ServiceArea:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - description: "A representation of a physical service area, a group of tables,\
          \ in a restaurant."
        properties:
          name:
            description: The name of this service area.
            type: string
          revenueCenter:
            $ref: "#/components/schemas/ExternalReference"
        type: object
      example:
        revenueCenter:
          entityType: entityType
          guid: guid
          externalId: externalId
        entityType: entityType
        name: name
        guid: guid
    ServiceCharge:
      allOf:
      - $ref: "#/components/schemas/ExternalReference"
      - description: Any charge applied to a check for something other than menu item.
          Typical examples include gratuity and delivery fees.
        properties:
          name:
            description: The name of this service charge.
            type: string
          amountType:
            description: The type of service charge.
            enum:
            - FIXED
            - PERCENT
            - OPEN
            type: string
          amount:
            description: Amount in USD to be applied for `FIXED` type service charges.
            format: double
            type: number
          percent:
            description: |
              Percent fee to be applied for `PERCENT` type service
              charges, based on pre-discount check amount. Must be a
              number between 0 and 100.
            format: double
            type: number
          criteria:
            $ref: "#/components/schemas/ServiceChargeCriteria"
          gratuity:
            description: True if the service charge is a gratuity and is assigned
              to the owner of the check.
            type: boolean
          taxable:
            description: True if tax should be applied to the service charge.
            type: boolean
          applicableTaxes:
            description: "A reference to the taxes applied to the service charge,\
              \ if the service charge is taxable."
            items:
              $ref: "#/components/schemas/TaxRate"
            type: array
          serviceChargeCalculation:
            description: Defines whether or not the service charge is applied before
              (PRE) or after (POST) discounts. This field is null for non-percent
              service charges.
            enum:
            - PRE_DISCOUNT
            - POST_DISCOUNT
            type: string
          destination:
            description: |
              Final recipient of the funds from this service charge.

              * `RESTAURANT` - The business owner of the restaurant receives the service charge funds.
              * `SERVER` - Restaurant employees receive the service charge funds e.g. gratuity.
              * `TOAST` - Toast receives the service charge funds.
              * `THIRD_PARTY` - A third party receives the service charge funds e.g. fundraising funds go to charity.
            enum:
            - RESTAURANT
            - SERVER
            - TOAST
            - THIRD_PARTY
            type: string
          taxInclusive:
            description: Supports future functionality.
            type: boolean
          taxProrated:
            description: Supports future functionality.
            type: boolean
        type: object
      example:
        amountType: FIXED
        amount: 0.8008281904610115
        taxable: true
        serviceChargeCalculation: PRE_DISCOUNT
        entityType: entityType
        criteria:
          delivery: true
          maxCheckAmount: 5.962133916683182
          minDeliveryDistance: 5.637376656633329
          takeout: true
          minCheckAmount: 1.4658129805029452
          dineIn: true
        destination: RESTAURANT
        externalId: externalId
        gratuity: true
        taxProrated: true
        percent: 6.027456183070403
        taxInclusive: true
        applicableTaxes:
        - isDefault: true
          conditionalTaxRates:
          - condition: condition
            rate: 2.027123023002322
          - condition: condition
            rate: 2.027123023002322
          taxTable:
          - start: 7.061401241503109
            pattern: true
            end: 9.301444243932576
            tax: 3.616076749251911
          - start: 7.061401241503109
            pattern: true
            end: 9.301444243932576
            tax: 3.616076749251911
          rate: 2.3021358869347655
          entityType: entityType
          roundingType: HALF_UP
          name: name
          guid: guid
          type: PERCENT
        - isDefault: true
          conditionalTaxRates:
          - condition: condition
            rate: 2.027123023002322
          - condition: condition
            rate: 2.027123023002322
          taxTable:
          - start: 7.061401241503109
            pattern: true
            end: 9.301444243932576
            tax: 3.616076749251911
          - start: 7.061401241503109
            pattern: true
            end: 9.301444243932576
            tax: 3.616076749251911
          rate: 2.3021358869347655
          entityType: entityType
          roundingType: HALF_UP
          name: name
          guid: guid
          type: PERCENT
        name: name
        guid: guid
    ServiceChargeCriteria:
      description: Describes thresholds for when a service charge should be applied
        to a check.
      example:
        delivery: true
        maxCheckAmount: 5.962133916683182
        minDeliveryDistance: 5.637376656633329
        takeout: true
        minCheckAmount: 1.4658129805029452
        dineIn: true
      properties:
        minCheckAmount:
          description: The service charge is only applicable if the pre-discount check
            is at least this amount.
          format: double
          type: number
        delivery:
          description: True if the service charge is only applicable for deliveries.
          type: boolean
        maxCheckAmount:
          description: The service charge is waived if the pre-discount check amount
            is more than this amount. A `null` value means this criteria is inapplicable.
          format: double
          type: number
        minDeliveryDistance:
          description: The service charge is only applicable to deliveries that are
            at least this distance. A `null` value means this criteria is inapplicable.
          format: double
          type: number
        takeout:
          description: Indicates whether the service charge is automatically applied
            to orders that have the takeout dining option behavior.
          type: boolean
        dineIn:
          description: Indicates whether the service charge is applied to orders that
            have the dine-in dining option behavior.
          type: boolean
      type: object
    Table:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - description: Represents a dining table in a restaurant.
        properties:
          name:
            description: The human-readable name of this table as it appears in the
              POS.
            type: string
          serviceArea:
            $ref: "#/components/schemas/ToastReference"
          revenueCenter:
            $ref: "#/components/schemas/ExternalReference"
        type: object
      example:
        revenueCenter:
          entityType: entityType
          guid: guid
          externalId: externalId
        serviceArea:
          entityType: entityType
          guid: guid
        entityType: entityType
        name: name
        guid: guid
    TaxRate:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - properties:
          name:
            description: The name of this tax rate.
            type: string
          isDefault:
            description: True if this tax rate is the default tax rate.
            type: boolean
          rate:
            description: |
              The tax rate value.

              For a fixed amount tax rate, is the fixed amount of the tax.

              For a percent tax rate, the percentage is expressed as a decimal value. For example, if the tax rate is 6.25%, then `rate` is 0.0625.

              If `type` is `NONE`, then `rate` is `null`.
            format: double
            type: number
          type:
            description: The type of the tax rate.
            enum:
            - PERCENT
            - FIXED
            - TABLE
            - NONE
            - EXTERNAL
            type: string
          roundingType:
            description: |
              The method used to round fractional currency amounts to non-fractional currency amounts.

              Only applies to `PERCENT` tax rates. For other tax rate types, `roundingType` is `null`.

              Valid values:

              * `HALF_UP` - Round values up or down to the nearest number. If the last digit is 5, which is halfway, then always round up to the nearest number.

              * `HALF_EVEN` - Round values up or down to the nearest number. If the last digit is 5, which is halfway, then round up or down to the nearest even number.

              * `ALWAYS_UP` - Always round up to the next number.

              * `ALWAYS_DOWN` - Always round down to the next number.

              For more details and examples, see <a href="https://doc.toasttab.com/doc/platformguide/adminPercentTaxRates.html#roundingOptions">Rounding options</a>.
            enum:
            - HALF_UP
            - HALF_EVEN
            - ALWAYS_UP
            - ALWAYS_DOWN
            type: string
          taxTable:
            description: An array of `TaxTableRow` objects that define a set of tax
              amounts that apply to specific sale amount ranges.
            items:
              $ref: "#/components/schemas/TaxTableRow"
            type: array
          conditionalTaxRates:
            description: |
              An array of `ConditionalTaxRate`
              objects that indicate the conditional rates that override
              the default `rate` for this `TaxRate` in specific
              situations. For example, a conditional rate might
              override the default rate when a `TaxRate` is applied for
              a specific dining option, such as takeout.
            items:
              $ref: "#/components/schemas/ConditionalTaxRate"
            type: array
        type: object
      example:
        isDefault: true
        conditionalTaxRates:
        - condition: condition
          rate: 2.027123023002322
        - condition: condition
          rate: 2.027123023002322
        taxTable:
        - start: 7.061401241503109
          pattern: true
          end: 9.301444243932576
          tax: 3.616076749251911
        - start: 7.061401241503109
          pattern: true
          end: 9.301444243932576
          tax: 3.616076749251911
        rate: 2.3021358869347655
        entityType: entityType
        roundingType: HALF_UP
        name: name
        guid: guid
        type: PERCENT
    ConditionalTaxRate:
      description: |
        A conditional tax rate that overrides the default `rate`
        for a `TaxRate` in
        specific situations. For example, a conditional rate
        might override the default rate when a `TaxRate` is
        applied for a specific dining option, such as takeout.
      example:
        condition: condition
        rate: 2.027123023002322
      properties:
        condition:
          description: A string describing the condition for the tax rate
          type: string
        rate:
          description: The percentage rate of the conditional tax rate
          format: double
          type: number
      type: object
    TaxTableRow:
      description: A closed sale amount range that corresponds to a specific tax amount
        in a tax table.
      example:
        start: 7.061401241503109
        pattern: true
        end: 9.301444243932576
        tax: 3.616076749251911
      properties:
        start:
          description: The start of a sale amount range that corresponds to a specific
            tax amount in a tax table.
          format: currency
          type: number
        end:
          description: The end of a sale amount range that corresponds to a specific
            tax amount in a tax table.
          format: currency
          type: number
        tax:
          description: The tax amount for the tax table row.
          format: currency
          type: number
        pattern:
          description: Specifies whether the price range is part of an incomplete
            set of ranges that establish an algorithm that you can use to calculate
            tax amounts.
          type: boolean
      type: object
    TipWithholding:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - properties:
          enabled:
            description: |
              Indicates whether a restaurant location withholds a percent of
              employees' credit card tips.

              * `true` - the location keeps a percent of employees' credit card
              tips.

              * `false` - the location does not keep a percent of employees'
              credit card tips.
            type: boolean
          percentage:
            description: |
              The decimal percentage of credit card tips withheld. If tip
              withholding is not `enabled`, tips will not be withheld in the
              Toast platform regardless of this value.
            type: number
        type: object
      description: |
        Information about the way tip withholding is configured for
        a restaurant. Tip withholding is a percentage of employees'
        credit card tips and service charges that are paid to
        employees as a gratuity that is kept by a restaurant to
        cover credit card processing fees.
      example:
        entityType: entityType
        percentage: 0.8008281904610115
        guid: guid
        enabled: true
    VoidReason:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - description: "When voiding something through the POS, the user must choose\
          \ a preconfigured void reason."
        properties:
          name:
            description: The name of this void reason.
            type: string
        type: object
      example:
        entityType: entityType
        name: name
        guid: guid
    Image:
      description: Information about an image associated with a menu or menu item.
      example:
        url: url
      properties:
        url:
          description: The web address of the image.
          type: string
      type: object
    ExternalReference:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - description: A wrapper object with fields that allow reference to a Toast
          entity by Toast GUID or a partner's identifier.
        properties:
          externalId:
            description: "External identifier string, prefixed by the naming authority."
            type: string
        type: object
      example:
        entityType: entityType
        guid: guid
        externalId: externalId
    ToastReference:
      description: A wrapper object with fields that allow reference to a Toast entity
        by Toast GUID.
      example:
        entityType: entityType
        guid: guid
      properties:
        guid:
          description: The GUID maintained by the Toast POS.
          type: string
        entityType:
          description: The type of object this is.
          type: string
      required:
      - entityType
      - guid
      type: object
  securitySchemes:
    oauth2:
      description: "Access to Toast APIs, specific endpoints, \nand specific API endpoint\
        \ operations is \ncontrolled by the scopes that are associated \nwith your\
        \ API account. \nA full reference for Toast API scopes and \ntheir capabilities\
        \ can be found in the\n[_Toast Developer Guide_](https://doc.toasttab.com/doc/devguide/apiScopes.html).\n"
      flows:
        clientCredentials:
          scopes:
            config:read: |
              Allows reading from the configuration API.
          tokenUrl: https://toast-api-server/authentication/v1/authentication/login
      type: oauth2

openapi: 3.0.1
info:
  contact:
    name: Toast developer support
  description: "Returns information about the configuration of a restaurant and \n\
    its menus, such as menu items and alternate payment types, as \nwell as physical\
    \ configuration such as cash drawers and \nrestaurant tables.\n\nThe configuration\
    \ API does not return information about entities that you have \nremoved from\
    \ your restaurant configuration or archived.\n"
  title: Configuration API
  version: 2.5.0
servers:
- url: https://toast-api-server/config/v2
tags:
- name: Alternate Payment Types
- name: Break Types
- name: Cash Drawers
- name: Dining Options
- name: Discounts
- name: Menu Groups
- name: Menu Items
- name: Modifier Groups
- name: Menus
- name: No Sale Reasons
- name: Payout Reasons
- name: Pre Modifier Groups
- name: Pre Modifiers
- name: Price Groups
- name: Printers
- name: Restaurant Services
- name: Revenue Centers
- name: Sales Categories
- name: Service Areas
- name: Service Charges
- name: Tables
- name: Tax Rates
- name: Tip Withholding
- name: Void Reasons
paths:
  /alternatePaymentTypes/{guid}:
    get:
      description: |
        Returns an `AlternatePaymentType`
        object containing information about an alternative form of payment
        configured for a restaurant. Alternate payment types are forms
        of payment that are not standard in the Toast POS and that are
        configured for a particular restaurant. For example, a
        third-party service that processes payments might be configured
        as an alternate payment type.
      operationId: alternatePaymentTypesGuidGet
      parameters:
      - description: |
          The Toast POS GUID of the restaurant that the alternate payment
          type is configured for.
        in: header
        name: Toast-Restaurant-External-ID
        required: true
        schema:
          type: string
      - description: The Toast POS GUID of the alternative form of payment.
        in: path
        name: guid
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlternatePaymentType"
          description: Returns an `AlternatePaymentType` object.
      security:
      - oauth2:
        - config:read
      summary: |
        Get an alternative payment type
      tags:
      - Alternate Payment Types
  /alternatePaymentTypes:
    get:
      description: |
        Returns an array of `AlternatePaymentType`
        objects containing information about alternative forms of
        payment that are configured for a restaurant. Alternate
        payment types are forms of payment that are not standard in the
        Toast POS and that are configured for a particular restaurant.
        For example, a third-party service that processes payments
        might be configured as an alternate payment type. If a
        `lastModified` date is specified, returns all objects that were
        created or modified after that date.
      operationId: alternatePaymentTypesGet
      parameters:
      - description: |
          The Toast POS GUID of the restaurant that the configuration
          applies to.
        in: header
        name: Toast-Restaurant-External-ID
        required: true
        schema:
          type: string
      - description: "A string that identifies the set of data objects that the \n\
          endpoint will return in its response data. You can use this \nparameter\
          \ to retrieve one page of response data. You \nget the value that you supply\
          \ in the `pageToken` parameter \nfrom the `Toast-Next-Page-Token` header\
          \ field value of a \nprevious request to the endpoint. For more information,\
          \ see \n<a href=\"https://doc.toasttab.com/doc/devguide/apiResponseDataPagination.html\"\
          >Paginating response data</a>.\n"
        in: query
        name: pageToken
        schema:
          type: string
      - description: |
          Limits the return data to objects created or modified after
          a specific date and time. For example:
          `2024-06-20T00:00:00.000%2B0000`.
        in: query
        name: lastModified
        schema:
          format: date-time
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/AlternatePaymentType"
                maxItems: 300
                minItems: 0
                title: Response
                type: array
          description: Returns an array of `AlternatePaymentType` objects.
          headers:
            Toast-Next-Page-Token:
              description: "A string that identifies the following set of objects\
                \ \nthat the endpoint will return. You can use this value \nto retrieve\
                \ that page of response data. To return \nthe next page of objects\
                \ you supply this value in the \n`pageToken` parameter of the next\
                \ request to the \nendpoint. For more information, see \n<a href=\"\
                https://doc.toasttab.com/doc/devguide/apiResponseDataPagination.html\"\
                >Paginating response data</a>.\n\nThe endpoint does not return the\
                \ \n`Toast-Next-Page-Token` field if there is no following \npage\
                \ of response data objects. For example, the \nendpoint will not return\
                \ a `Toast-Next-Page-Token` \nheader field if all the data objects\
                \ fit in one \nresponse or if you have reached the last page of \n\
                response objects.\n"
              schema:
                type: string
      security:
      - oauth2:
        - config:read
      summary: |
        Get alternative payment types
      tags:
      - Alternate Payment Types

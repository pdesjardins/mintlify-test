openapi: 3.0.1
info:
  description: "This API specification describes the interface that the Toast POS\
    \ \nsystem calls when it processes tender transactions.\n\nImplement this REST\
    \ API to allow the Toast POS system to process \ntender transactions, allowing\
    \ payments and discounts to be applied\nto a check.\n"
  title: Toast Tender Integration API
  version: 0.1.0
servers:
- url: /yourapiname/v1
paths:
  /yourendpointname:
    post:
      description: "Provides information about a tender transaction processed by \n\
        the Toast POS system. The transaction information in the \nmessage body is\
        \ intended to allow a tender provider to \nperform corresponding operations\
        \ on the tender account, \nmaintained by that provider. The response to this\
        \ message\nallows the Toast POS system to update the check, including posting\n\
        payments and discounts to the check.\n\nYou define the endpoint name for this\
        \ implementation. The Toast \nPOS system makes requests to the REST path that\
        \ you supply \nduring integration setup.\n\nEach `POST` request to the endpoint\
        \ includes a \n`Toast-Transaction-Type` header parameter value to indicate\
        \ the \ntype of tender transaction it represents. The supported \ntransaction\
        \ types are:\n\n* Retrieve discounts that are available on a given check.\n\
        * Retrieve payments that are available on a given check.\n* Redeem retrieved\
        \ payments and/or discounts.\n* Add a tip to a previously confirmed payment.\n\
        * Reverse a previous redemption or gratuity.\n* Request configured search\
        \ terms for the restaurant.\n* Search for an account.\n\nThe <a \nhref=\"\
        #/definitions/TenderTransaction\">`TenderTransaction`</a>\nobject in the message\
        \ body includes a set of information that \nis specific for each transaction\
        \ type.\n\nThe response time for a tender transaction request must be \nless\
        \ than 500ms on average. A response time of greater than\n5000ms will be considered\
        \ a timeout.\n\nAll tender transactions must be considered idempotent. The\
        \ \nimplementation must handle multiple requests with the same \n`Toast-Transaction-GUID`,\
        \ `Toast-Transaction-Type`, and \n`tenderIdentifier`.\n"
      parameters:
      - description: "A unique identifier of the tender transaction, defined \nby\
          \ the Toast POS system. This value is\nreferenced if there is a future reverse\
          \ transaction call.\n"
        in: header
        name: Toast-Transaction-GUID
        schema:
          type: string
      - description: "The unique identifier of the restaurant, defined by the \nToast\
          \ POS system.\n"
        in: header
        name: Toast-Restaurant-External-ID
        schema:
          type: string
      - description: |
          The unique identifier of the Alternate Payment Type used to pay for this Tender transaction.
        in: header
        name: Toast-Alternate-Payment-Type-GUID
        schema:
          type: string
      - description: |
          The type of tender transaction that occurred. Values are:
          <ul>
            <li>TENDER_RETRIEVE_DISCOUNTS</li>
            <li>TENDER_RETRIEVE_PAYMENTS</li>
            <li>TENDER_REDEEM</li>
            <li>TENDER_GRATUITY</li>
            <li>TENDER_REVERSE</li>
            <li>TENDER_SEARCH_CONFIG</li>
            <li>TENDER_SEARCH</li>
          </ul>

          </ul>
        in: header
        name: Toast-Transaction-Type
        schema:
          enum:
          - TENDER_SEARCH
          - TENDER_SEARCH_CONFIG
          - TENDER_RETRIEVE_DISCOUNTS
          - TENDER_RETRIEVE_PAYMENTS
          - TENDER_REDEEM
          - TENDER_GRATUITY
          - TENDER_REVERSE
          type: string
      - description: |
          An API key used to authenticate the request. This API key is provided by the tender partner and can be found in the request header. For more information, see [Authenticating outbound API requests](https://doc.toasttab.com/doc/devguide/apiAuthenticatingRequestsFromToastApiClients.html).
        in: header
        name: Authorization
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenderTransaction"
        description: "A <a \nhref=\"#/definitions/TenderTransaction\">`TenderTransaction`</a>\
          \ \nobject containing information about the tender \ntransaction that the\
          \ Toast POS system is requesting.\n"
        required: false
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenderTransactionResponse"
          description: "OK. The `transactionStatus` value of the \n`TenderTransactionResponse`\
            \ object is `ACCEPT`.\n"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenderTransactionResponse"
          description: "Bad request. The `transactionStatus` value of the \n`TenderTransactionResponse`\
            \ object is one of:\n\n* `ERROR_INVALID_TOAST_TRANSACTION_TYPE`\n* `ERROR_INVALID_INPUT_PROPERTIES`\n\
            * `ERROR_INVALID_TOKEN`\n* `ERROR_INVALID_RESTAURANT`\n* `ERROR_TRANSACTION_DOES_NOT_EXIST`\n\
            * `ERROR_TRANSACTION_CANNOT_BE_REVERSED`\n* `ERROR_ACCOUNT_INVALID`\n\
            * `ERROR_ACCOUNT_NO_POST`\n* `ERROR_INSUFFICIENT_FUNDS`\n* `ERROR_UNABLE_TO_PROCESS`\n\
            * `FOLIO_IN_USE`\n"
        "500":
          content: {}
          description: Internal server error.
      summary: |
        Provides information about a tender transaction to a tender provider.
      x-codegen-request-body-name: tenderTransaction
components:
  schemas:
    TenderTransaction:
      description: "Information about a tender transaction in the Toast POS \nsystem.\
        \ Tender providers are expected to handle that \ntransaction.\n\nThe set of\
        \ information in this object depends on the tender \ntransaction type. The\
        \ transaction type is specified in the \n`Toast-Transaction-Type` header parameter\
        \ for the request.\n\nThe `TenderTransaction` object includes the following\
        \ values \nfor specific transaction types:\n\n* `TENDER_RETRIEVE_DISCOUNTS`\
        \ - includes a `discountsTransactionInformation` value.\n* `TENDER_RETRIEVE_PAYMENTS`\
        \ - includes a `paymentsTransactionInformation` value.\n* `TENDER_REDEEM`\
        \ - includes a `redeemTransactionInformation` value.\n* `TENDER_GRATUITY`\
        \ - includes a `gratuityTransactionInformation` value.\n* `TENDER_REVERSE`\
        \ - includes a `reverseTransactionInformation` value.\n* `TENDER_SEARCH_CONFIG`\
        \ - no additional values.\n* `TENDER_SEARCH` - includes an `searchTransactionInformation`\
        \ value.\n"

    TenderTransactionResponse:
      description: "Information about a tender transaction from the tender \nprovider.\
        \ The Toast POS system uses this information to \ncomplete guests' tender\
        \ transactions.\n\nThe set of information in this object depends on the tender\
        \ \ntransaction type. The transaction type is specified in the \n`Toast-Transaction-Type`\
        \ header parameter for the request.\n\nAll `TenderTransactionResponse` objects\
        \ must include a \n`transactionStatus` value.\n\nThe `TenderTransactionResponse`\
        \ object includes the following values \nfor specific transaction types:\n\
        \n* `TENDER_RETRIEVE_DISCOUNTS` - includes a `discountsResponse` value.\n\
        * `TENDER_RETRIEVE_PAYMENTS` - includes a `paymentsResponse` value.\n* `TENDER_REDEEM`\
        \ - no additional fields\n* `TENDER_GRATUITY` - includes a `gratuityResponse`\
        \ value.\n* `TENDER_REVERSE` - no additional fields.\n* `TENDER_SEARCH_CONFIG`\
        \ - includes a `searchConfigResponse` value.\n* `TENDER_SEARCH` - includes\
        \ an `searchResponse` value.\n"
      example:
        discountsResponse:
          tenderDiscounts:
          - identifier: identifier
            amount: 0.8008281904610115
            appliedDiscountGuid: appliedDiscountGuid
            name: name
            selectionGuid: selectionGuid
          - identifier: identifier
            amount: 0.8008281904610115
            appliedDiscountGuid: appliedDiscountGuid
            name: name
            selectionGuid: selectionGuid
          account:
            tenderIdentifier: tenderIdentifier
            properties:
              tenderPropertyType: FOLIO
              value: value
              key: key
              maxLength: maxLength
        transactionStatus: ACCEPT
        gratuityResponse:
          tenderPayments:
          - identifier: identifier
            amount: 6.027456183070403
            tipAmount: 1.4658129805029452
            paymentGuid: paymentGuid
            name: name
            type: CREDIT
          - identifier: identifier
            amount: 6.027456183070403
            tipAmount: 1.4658129805029452
            paymentGuid: paymentGuid
            name: name
            type: CREDIT
          account:
            tenderIdentifier: tenderIdentifier
            properties:
              tenderPropertyType: FOLIO
              value: value
              key: key
              maxLength: maxLength
        searchResponse:
          searchResults:
          - tenderIdentifier: tenderIdentifier
            properties:
              tenderPropertyType: FOLIO
              value: value
              key: key
              maxLength: maxLength
          - tenderIdentifier: tenderIdentifier
            properties:
              tenderPropertyType: FOLIO
              value: value
              key: key
              maxLength: maxLength
        searchConfigResponse:
          searchTermNames:
            tenderPropertyType: FOLIO
            value: value
            key: key
            maxLength: maxLength
        paymentsResponse:
          tenderPayments:
          - identifier: identifier
            amount: 6.027456183070403
            tipAmount: 1.4658129805029452
            paymentGuid: paymentGuid
            name: name
            type: CREDIT
          - identifier: identifier
            amount: 6.027456183070403
            tipAmount: 1.4658129805029452
            paymentGuid: paymentGuid
            name: name
            type: CREDIT
          account:
            tenderIdentifier: tenderIdentifier
            properties:
              tenderPropertyType: FOLIO
              value: value
              key: key
              maxLength: maxLength
      properties:
        transactionStatus:
          $ref: "#/components/schemas/TenderTransactionStatus"
        searchConfigResponse:
          $ref: "#/components/schemas/TransactionResponseSearchConfig"
        searchResponse:
          $ref: "#/components/schemas/TransactionResponseSearch"
        discountsResponse:
          $ref: "#/components/schemas/TransactionResponseDiscounts"
        paymentsResponse:
          $ref: "#/components/schemas/TransactionResponsePayments"
        gratuityResponse:
          $ref: "#/components/schemas/TransactionResponseGratuity"
      type: object
    TenderTransactionStatus:
      description: |
        Indicates the result of a tender transaction, reported by the
        tender service provider. This property must be present on all
        responses. Possible values are:

        <ul>
          <li>`ACCEPT` - The tender service provider processed the transaction successfully.</li>
          <li>`ERROR_INVALID_TOAST_TRANSACTION_TYPE` - The requested Toast-Transaction-Type is not valid.</li>
          <li>`ERROR_INVALID_INPUT_PROPERTIES` - The specified JSON properties in the request body are not valid.</li>
          <li>`ERROR_INVALID_TOKEN` - The token supplied in the `Authorization` header field is invalid.</li>
          <li>`ERROR_INVALID_RESTAURANT` - The restaurant specified by the `Toast-Restaurant-External-ID` is invalid.</li>
          <li>`ERROR_ACCOUNT_INVALID` - The tender identifier provided did not correspond to an account, or the account
            is not valid at the current restaurant.</li>
          <li>`ERROR_ACCOUNT_NO_POST` - The tender identifier provided corresponded to an account which has no card on file or
            has been marked as "no post".
          <li>`ERROR_FOLIO_IN_USE` - Some property management systems limit guest folio access to one source at a time. If the front desk agent is using the property management system to access a guest folio, it may be locked and therefore unavailable for room charge posting during that time.</li>
          <li>`ERROR_INSUFFICIENT_FUNDS` - The payment or tip, specified in TENDER_RETRIEVE_PAYMENTS or TENDER_RETRIEVE_GRATUITY,
            cannot be retrieved because the tender account does not have sufficient balance.</li>
          <li>`ERROR_UNABLE_TO_PROCESS` - The transaction cannot be processed by the partner.</li>
          <li>`ERROR_TRANSACTION_DOES_NOT_EXIST` - The transaction that is being requested to be reversed or updated
            does not exist. Only occurs on a `TENDER_REVERSE` or `TENDER_GRATUITY` response.</li>
          <li>`ERROR_TRANSACTION_CANNOT_BE_REVERSED` - The specified transaction cannot be reversed. Only `TENDER_REDEEM`
            and `TENDER_GRATUITY` transactions can be reversed.</li>
        </ul>
      enum:
      - ACCEPT
      - ERROR_INVALID_TOAST_TRANSACTION_TYPE
      - ERROR_INVALID_INPUT_PROPERTIES
      - ERROR_INVALID_TOKEN
      - ERROR_INVALID_RESTAURANT
      - ERROR_TRANSACTION_DOES_NOT_EXIST
      - ERROR_TRANSACTION_CANNOT_BE_REVERSED
      - ERROR_ACCOUNT_INVALID
      - ERROR_ACCOUNT_NO_POST
      - ERROR_FOLIO_IN_USE
      - ERROR_INSUFFICIENT_FUNDS
      - ERROR_UNABLE_TO_PROCESS
      type: string
    TransactionResponseSearchConfig:
      description: |
        A list of search terms supported by the tender provider. This will populate
        the list of search terms displayed by the Toast POS system when a search is requested.
      example:
        searchTermNames:

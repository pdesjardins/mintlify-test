    Customer:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - properties:
          firstName:
            description: First name of the guest who placed the order.
            type: string
          lastName:
            description: Last name of the guest who placed the order.
            type: string
          phone:
            description: The phone number corresponding to the guest who placed the
              order.
            type: string
          email:
            description: "The email address corresponding to the guest who placed\
              \ the order. The email address is the key that identifies a unique restaurant\
              \ guest, and all distinct guests should have distinct email addresses."
            type: string
        required:
        - email
        - firstName
        - lastName
        - phone
        type: object
      example:
        firstName: firstName
        lastName: lastName
        phone: phone
        entityType: entityType
        guid: guid
        email: email
    DeliveryInfo:
      description: Required if the dining option behavior is DELIVERY
      properties:
        address1:
          description: |
            The first line of the street address of the delivery destination.
          type: string
        address2:
          description: |
            The second line of the street address of the delivery destination.
          type: string
        city:
          description: |
            The name of the city or town of the delivery destination.
          type: string
        state:
          description: "The postal abbreviation of the state or province of the \n\
            delivery destination. The abbreviation must be in ISO 3166-2 \nformat\
            \ (two capital letters).\n"
          format: ISO 3166-2
          type: string
        zipCode:
          description: |
            The postal or zip code of the delivery destination.
          type: string
        latitude:
          description: "The north/south geographic coordinate of the delivery \ndestination,\
            \ in decimal format.\n"
          format: double
          type: number
        longitude:
          description: "The east/west geographic coordinate of the delivery \ndestination,\
            \ in decimal format.\n"
          format: double
          type: number
        notes:
          description: |
            Additional instructions or information about the delivery.
          type: string
        deliveredDate:
          description: "The date and time that the delivery employee indicated that\
            \ \nthe order was delivered in the Toast POS system. Response only. This\
            \ \nvalue is only set when the dining option for the order is \n`DELIVERY`.\
            \ For other dining options, the value is `null`. <a \nhref=\"https://doc.toasttab.com/doc/devguide/api_dates_and_timestamps.html\"\
            >Use \nISO 8601 date and time format for all Toast APIs.</a>\n"
          format: date-time
          type: string
        dispatchedDate:
          description: "The date and time that the restaurant indicated that the \n\
            order was available for delivery and assigned to a delivery \nemployee\
            \ in the Toast POS system. This value is only set when the \ndining option\
            \ for the order is `DELIVERY`. For other dining \noptions, the value is\
            \ `null`. <a \nhref=\"https://doc.toasttab.com/doc/devguide/api_dates_and_timestamps.html\"\
            >Use \nISO 8601 date and time format for all Toast APIs.</a>\n"
          format: date-time
          type: string
        deliveryEmployee:
          $ref: "#/components/schemas/ExternalReference"
      required:
      - address1
      - city
      - state
      - zipCode
      type: object
    AppliedServiceCharge:
      allOf:
      - $ref: "#/components/schemas/ExternalReference"
      - properties:
          chargeAmount:
            description: The final applied amount excluding tax. This is required
              if amountType is OPEN.
            format: double
            type: number
          serviceCharge:
            $ref: "#/components/schemas/ExternalReference"
          chargeType:
            description: Derived from `serviceCharge`. An OPEN service charge can
              either be a dollar amount or a percentage.
            enum:
            - FIXED
            - PERCENT
            - OPEN
            type: string
          name:
            description: Derived from `serviceCharge` - the configured human readable
              label for the service charge.
            type: string
          delivery:
            description: Derived from `serviceCharge` - whether this service charge
              is a delivery charge.
            type: boolean
          gratuity:
            description: Derived from `serviceCharge` - whether this service charge
              is a gratuity. Can be used to derive required tip amount on the check.
            type: boolean
          taxable:
            description: Derived from `serviceCharge` - whether this service charge
              is taxable.
            type: boolean
          appliedTaxes:
            description: Derived from `serviceCharge` - the taxes applied to the service
            items:
              $ref: "#/components/schemas/AppliedTaxRate"
            type: array
        required:
        - serviceCharge
        type: object
      description: A percentage/open/fixed service charge added to a check which can
        represent in general an upcharge like a gratuity or delivery fee. Whether
        the upcharge is taxable is defined in the restaurant-configured `serviceCharge`.
        The fields on the `AppliedServiceCharge` are computed based on the referenced
        `ServiceCharge` configuration.
      example:
        delivery: true
        serviceCharge:
          entityType: entityType
          guid: guid
          externalId: externalId
        taxable: true
        entityType: entityType
        chargeType: FIXED
        name: name
        guid: guid
        externalId: externalId
        gratuity: true
        chargeAmount: 4.145608029883936
        appliedTaxes:
        - taxRate:
            entityType: entityType
            guid: guid
          rate: 3.616076749251911
          entityType: entityType
          name: name
          guid: guid
          taxAmount: 2.027123023002322
          type: PERCENT
        - taxRate:
            entityType: entityType
            guid: guid
          rate: 3.616076749251911
          entityType: entityType
          name: name
          guid: guid
          taxAmount: 2.027123023002322
          type: PERCENT
    AppliedTaxRate:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - properties:
          taxRate:
            $ref: "#/components/schemas/ToastReference"
          name:
            description: The name of the tax rate.
            type: string
          rate:
            description: "The tax rate, which can be a fixed amount, a percentage,\
              \ or null."
            format: double
            type: number
          taxAmount:
            description: The tax amount that was actually applied.
            format: double
            type: number
          type:
            description: The type of the tax rate. Default is percent if no tax rate
              config
            enum:
            - PERCENT
            - FIXED
            - NONE
            - TABLE
            type: string
        type: object
      description: A tax rate applied to an `Item` or `ServiceCharge`.
      example:
        taxRate:
          entityType: entityType
          guid: guid
        rate: 3.616076749251911
        entityType: entityType
        name: name
        guid: guid
        taxAmount: 2.027123023002322
        type: PERCENT
    AppliedDiscountTrigger:
      description: The `Selection` which triggered the application of this discount.
      example:
        quantity: 5.962133916683182
        selection:
          entityType: entityType
          guid: guid
          externalId: externalId
      properties:
        selection:
          $ref: "#/components/schemas/ExternalReference"
        quantity:
          description: The amount of the selection used to trigger the applied discount.
          format: double
          type: number
      type: object
    AppliedDiscount:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - properties:
          name:
            description: The name of the applied discount.
            type: string
          discountAmount:
            description: The discount amount in USD. This amount is subtracted from
              the check or item.
            format: double
            type: number
          nonTaxDiscountAmount:
            description: "The amount that a discount reduces a menu item price,\n\
              excluding any discount amount applied to taxes. In most\ncases, a discount\
              \ only applies to the menu item price and\nthe `nonTaxDiscountAmount`\
              \ is the same as the `discountAmount`. \nIf you apply a discount to\
              \ a menu item that includes tax in \nits price, the `nonTaxDiscountAmount`\
              \ is less than the full \ndiscount amount.\n"
            format: double
            type: number
          discount:
            $ref: "#/components/schemas/ToastReference"
          triggers:
            description: Optional items which triggered this discount.
            items:
              $ref: "#/components/schemas/AppliedDiscountTrigger"
            type: array
          approver:
            $ref: "#/components/schemas/ExternalReference"
          processingState:
            description: |
              Applies to loyalty program discounts only. Loyalty
              program reward discounts are validated and then applied,
              or redeemed, by the third-party loyalty program service
              provider depending on the state of the Toast POS order.
              This value indicates the state of the discount in that
              validation and application process. Response only. The
              `processingState` may be one of the following enumerated
              values.
              <ul>
                <li><code>PENDING_APPLIED</code> - The loyalty program
                service provider has confirmed that the reward discount
                is valid for the order and customer. The reward has not
                been redeemed, or applied to the customer's loyalty
                account.</li>
                <li><code>APPLIED</code> - The reward discount has been
                redeemed. The reward is no longer available from the
                customer's loyalty program account.</li>
                <li><code>PENDING_VOID</code> - The reward discount has been
                removed from the Toast POS order. The reward is not
                available from the customer's loyalty program account
                until the loyalty program service provider processes
                the void operation.</li>
                <li><code>VOID</code> - The reward discount has been removed
                from the Toast POS order and the reward is available from
                the customer's loyalty program account again.</li>
              </ul>
            enum:
            - PENDING_APPLIED
            - APPLIED
            - PENDING_VOID
            - VOID
            type: string
          loyaltyDetails:
            $ref: "#/components/schemas/LoyaltyDetails"
          comboItems:
            description: A List of Menu Item Selections that this discount is applied
              to (empty for NonCombo Discounts).
            items:
              $ref: "#/components/schemas/ExternalReference"
            type: array
          appliedPromoCode:
            description: The promo code that was applied for this discount.
            type: string
        type: object
      description: |
        A discount applied to a check or item. The Toast POS system calculates
        service charges before applying discounts. The system calculates the tax
        after applying discounts. In a `POST` request, the type of the discount
        must be fixed amount or fixed percentage, and the discount must be applied
        to a check. For more information, see [Applying discounts to an entire
        check](https://doc.toasttab.com/doc/devguide/apiDiscountingOrders.html#apiApplyingDiscountsToACheck).
      example:
        approver:
          entityType: entityType
          guid: guid
          externalId: externalId
        processingState: PENDING_APPLIED
        loyaltyDetails:
          vendor: TOAST
          referenceId: referenceId
        entityType: entityType
        name: name
        comboItems:
        - entityType: entityType
          guid: guid
          externalId: externalId
        - entityType: entityType
          guid: guid
          externalId: externalId
        guid: guid
        discountAmount: 6.027456183070403
        discount:
          entityType: entityType
          guid: guid
        nonTaxDiscountAmount: 1.4658129805029452
        triggers:
        - quantity: 5.962133916683182
          selection:
            entityType: entityType
            guid: guid
            externalId: externalId
        - quantity: 5.962133916683182
          selection:
            entityType: entityType
            guid: guid
            externalId: externalId
        appliedPromoCode: appliedPromoCode
    LoyaltyDetails:
      description: Information about the loyalty program discount applied to a check.
        The loyalty program account is identified in the <a href="#/definitions/AppliedLoyaltyInfo">AppliedLoyaltyInfo</a>
        value for the check.
      example:
        vendor: TOAST
        referenceId: referenceId
      properties:
        vendor:
          description: The specific loyalty program service provider that supports
            the loyalty account.
          enum:
          - TOAST
          - PUNCHH
          - PUNCHH2
          - PAYTRONIX
          - APPFRONT
          - INTEGRATION
          type: string
        referenceId:
          description: The identifier of the loyalty program discount that is recognized
            by the loyalty program service provider. The Toast POS system transmits
            the discount identifier to the service provider to determine the validity
            and amount of the discount.
          type: string
      required:
      - referenceId
      - vendor
      type: object
    Refund:
      description: A discount applied to a check or item.
      example:
        refundBusinessDate: 9
        tipRefundAmount: 9.965781217890562
        refundDate: 2000-01-23T04:56:07.000+00:00
        refundAmount: 5.025004791520295
      properties:
        refundAmount:
          description: The amount of the refund excluding the tip.
          format: double
          type: number
        tipRefundAmount:
          description: The amount of the tip refund.
          format: double
          type: number
        refundDate:
          description: "The date and time the refund was made. <a \n    href=\"https://doc.toasttab.com/doc/devguide/api_dates_and_timestamps.html\"\
            >Use \n    ISO 8601 date and time format for all Toast APIs.</a>\n"
          format: date-time
          type: string
        refundBusinessDate:
          description: "The business date (yyyyMMdd) on which this refund was \ncreated.\n"
          type: integer
      type: object
    Device:
      description: "The *Device ID* value that the Toast POS system assigns to a specific\
        \ Toast POS device. The `id` value is a unique identifier for a device. To\
        \ find the ID for a Toast POS device, do the following. From the overflow\
        \  menu (⋮) select *Device Status* and then select the *Device* tab."
      example:
        id: id
      properties:
        id:
          description: The physical ID of the device
          type: string
      type: object
    VoidInformation:
      description: Information about a void applied to a check or item.
      example:
        voidBusinessDate: 6
        voidReason:
          entityType: entityType
          guid: guid
          externalId: externalId
        voidUser:
          entityType: entityType
          guid: guid
          externalId: externalId
        voidDate: 2000-01-23T04:56:07.000+00:00
        voidApprover:
          entityType: entityType
          guid: guid
          externalId: externalId
      properties:
        voidUser:
          $ref: "#/components/schemas/ExternalReference"
        voidApprover:
          $ref: "#/components/schemas/ExternalReference"
        voidDate:
          description: "The date on which the refund was made. <a \nhref=\"https://doc.toasttab.com/doc/devguide/api_dates_and_timestamps.html\"\
            >Use \nISO 8601 date and time format for all Toast APIs.</a>\n"
          format: date-time
          type: string
        voidBusinessDate:
          description: |
            The business date (yyyyMMdd) on which this void was made.
          type: integer
        voidReason:
          $ref: "#/components/schemas/ExternalReference"
      type: object
    ExternalReference:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - properties:
          externalId:
            description: External identifier string that is prefixed by the naming
              authority.
            type: string
        type: object
      description: A wrapper object with fields that allow reference to a Toast entity
        by Toast GUID or a partner's identifier.
      example:
        entityType: entityType
        guid: guid
        externalId: externalId
    ToastReference:
      description: A wrapper object with fields that allow reference to a Toast entity
        by Toast GUID.
      example:
        entityType: entityType
        guid: guid
      properties:
        guid:
          description: The GUID maintained by Toast.
          type: string
        entityType:
          description: The type of object this is.
          type: string
      required:
      - entityType
      - guid
      type: object

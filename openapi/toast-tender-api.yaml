          paymentGuid: paymentGuid
          name: name
          type: CREDIT
        - identifier: identifier
          amount: 6.027456183070403
          tipAmount: 1.4658129805029452
          paymentGuid: paymentGuid
          name: name
          type: CREDIT
        account:
          tenderIdentifier: tenderIdentifier
          properties:
            tenderPropertyType: FOLIO
            value: value
            key: key
            maxLength: maxLength
      properties:
        account:
          $ref: "#/components/schemas/AccountInfo"
        tenderPayments:
          description: |
            A list of the tender payments to be applied to the check.
          items:
            $ref: "#/components/schemas/TenderPayment"
          type: array
      type: object
    TransactionResponseGratuity:
      description: |
        Response to a request to update the gratuity amount on an already tendered
        payment.
      example:
        tenderPayments:
        - identifier: identifier
          amount: 6.027456183070403
          tipAmount: 1.4658129805029452
          paymentGuid: paymentGuid
          name: name
          type: CREDIT
        - identifier: identifier
          amount: 6.027456183070403
          tipAmount: 1.4658129805029452
          paymentGuid: paymentGuid
          name: name
          type: CREDIT
        account:
          tenderIdentifier: tenderIdentifier
          properties:
            tenderPropertyType: FOLIO
            value: value
            key: key
            maxLength: maxLength
      properties:
        account:
          $ref: "#/components/schemas/AccountInfo"
        tenderPayments:
          description: |
            The list of payments that were updated or added to cover the requested gratuity.
          items:
            $ref: "#/components/schemas/TenderPayment"
          type: array
      type: object
    AccountInfo:
      description: Information related to a given tender user.
      example:
        tenderIdentifier: tenderIdentifier
        properties:
          tenderPropertyType: FOLIO
          value: value
          key: key
          maxLength: maxLength
      properties:
        tenderIdentifier:
          description: A unique identifier for this account.
          type: string
        properties:
          $ref: "#/components/schemas/KeyValue"
      type: object
    TenderPayment:
      description: |
        Payment returned by the tender provider to be applied to the check.
      example:
        identifier: identifier
        amount: 6.027456183070403
        tipAmount: 1.4658129805029452
        paymentGuid: paymentGuid
        name: name
        type: CREDIT
      properties:
        name:
          description: |
            Name of this payment. This name is displayed on the check.
            Required.
          type: string
        identifier:
          description: "A unique identifier for this payment, provided by the tender\
            \ provider. \nNote that multiple payments of the same type must still\
            \ have unique identifiers.\nRequired.\n"
          type: string
        type:
          description: The payment method.
          enum:
          - CREDIT
          - STORED_VALUE
          - REWARD
          - OTHER
          - UNDETERMINED
          type: string
        amount:
          description: "The amount of this payment, excluding tips. Required."
          format: double
          type: number
        tipAmount:
          description: The amount tipped on this payment.
          format: double
          type: number
        paymentGuid:
          description: "If this payment was applied to the check by the Toast POS\
            \ system, this will indicate the \nGUID of the payment object that corresponds\
            \ to this tender payment.\nRequest only.\n"
          format: guid
          type: string
      type: object
    TenderDiscount:
      description: |
        A discount to be applied to a check. In response to a `TENDER_RETRIEVE_DISCOUNTS`
        request, the Toast POS system attempts to apply the discount to the check.
        In the `TENDER_RETRIEVE_PAYMENTS` and `TENDER_REDEEM`
        request, the successfully applied discounts are included.
      example:
        identifier: identifier
        amount: 0.8008281904610115
        appliedDiscountGuid: appliedDiscountGuid
        name: name
        selectionGuid: selectionGuid
      properties:
        name:
          description: |
            Name of this discount. This name is displayed on the check and in the restaurants reports.
            Required.
          type: string
        identifier:
          description: "A unique identifier for this discount, provided by the tender\
            \ provider. \nNote that multiple discounts of the same type must still\
            \ have unique identifiers.\nRequired.\n"
          type: string
        amount:
          description: |
            Amount that will be discounted from the item or check. This cannot be more than
            the pre-tax total of the item or check. Required.
          format: double
          type: number
        selectionGuid:
          description: |
            GUID of the selection this discount applies to. Required only if this
            is an item-level discount.
          format: guid
          type: string
        appliedDiscountGuid:
          description: "If this discount was applied to the check by the Toast POS\
            \ system, this will indicate the \nGUID of the appliedDiscount object\
            \ that corresponds to this tender discount.\nRequest only.\n"
          format: guid
          type: string
      type: object
    KeyValue:
      description: |
        An abstract key-value pair, used anytime the Toast POS system needs to submit or accept one
        or more configurable values.
      example:
        tenderPropertyType: FOLIO
        value: value
        key: key
        maxLength: maxLength
      properties:
        key:
          description: The key of the key-value pair.
          type: string
        value:
          description: The value of the key-value pair.
          type: string
        tenderPropertyType:
          description: |
            An optional type describing the purpose of a key-value pair. If provided, allows
            Toast to use a key-value pair in a specialized way, such as displaying the room ID on receipts
          enum:
          - FOLIO
          - GUEST_NAME
          - GUEST_SURNAME
          - RESULT_NUMBER
          - ROOM_ID
          - OTHER
          type: string
        maxLength:
          description: |
            An optional maximum length of input value. Used for Tender search to limit the length of the input.
          type: string
      type: object
    RevenueCenter:

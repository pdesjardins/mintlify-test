    CheckInfo:
      description: Information about a check associated with a transaction
      example:
        displayNumber: displayNumber
        guid: guid
      properties:
        guid:
          description: The GUID maintained by the Toast platform
          format: guid
          type: string
        displayNumber:
          description: The display number of the check
          type: string
      required:
      - displayNumber
      - guid
      type: object
    AppliedLoyaltyInfo:
      allOf:
      - $ref: "#/components/schemas/ToastReference"
      - properties:
          loyaltyIdentifier:
            description: An identifier for the loyalty program account.
            type: string
          vendor:
            description: "The specific loyalty program service provider that supports\
              \ the loyalty account. For all interactions with the Loyalty Integration\
              \ API, this value will be INTEGRATION."
            enum:
            - INTEGRATION
            type: string
          accrualFamilyGuid:
            description: An internal Toast POS identifier for loyalty program transactions.
            type: string
          accrualText:
            description: "A description of the loyalty program transaction that will\
              \ be printed on the customer's receipt. For example, \"Earned 27 points.\"\
              \ The maximum length of the description string is 255 characters."
            type: string
        type: object
      description: Information about the customer loyalty program account associated
        with a check.
      example:
        accrualFamilyGuid: accrualFamilyGuid
        entityType: entityType
        vendor: INTEGRATION
        accrualText: accrualText
        guid: guid
        loyaltyIdentifier: loyaltyIdentifier
    Selection:
      allOf:
      - $ref: "#/components/schemas/ExternalReference"
      - properties:
          item:
            $ref: "#/components/schemas/ExternalReference"
          itemGroup:
            $ref: "#/components/schemas/ExternalReference"
          optionGroup:
            $ref: "#/components/schemas/ExternalReference"
          preModifier:
            $ref: "#/components/schemas/ExternalReference"
          quantity:
            description: Quantity ordered. A decimal number for items sold by weight;
              a counting number for discrete items.
            format: double
            type: number
          unitOfMeasure:
            description: "The unit of measure required for weighing the item. Default\
              \ is NONE, which means the item is not meant to be weighed."
            enum:
            - NONE
            - LB
            - OZ
            - KG
            - G
            type: string
          selectionType:
            description: "Specifies whether this selection is a special request or\
              \ other off-menu sale. If left null or NONE, describes a normal modifier\
              \ or item selection."
            enum:
            - NONE
            - OPEN_ITEM
            - SPECIAL_REQUEST
            - PORTION
            type: string
          salesCategory:
            $ref: "#/components/schemas/ExternalReference"
          appliedDiscounts:
            description: The itemized discounts applied to this item.
            items:
              $ref: "#/components/schemas/AppliedDiscount"
            minItems: 0
            type: array
          deferred:
            description: "Whether this selection is a deferred revenue transaction,\
              \ e.g. gift card sales."
            type: boolean
          preDiscountPrice:
            description: Gross sale price for this selection. Excludes tax.
            format: double
            type: number
          price:
            description: "Net price for this selection. The final price of the item\
              \ after considering discounts (including discounts at the check level),\
              \ quantity adjustments, and modifier prices at the time the item was\
              \ selected for purchase."
            format: double
            type: number
          tax:
            description: The total tax amount for this selection.
            format: double
            type: number
          voided:
            description: True if this selection has been voided.
            type: boolean
          voidDate:
            description: "The date on which this selection was voided. <a \nhref=\"\
              https://doc.toasttab.com/doc/devguide/api_dates_and_timestamps.html\"\
              >Use \nISO 8601 date and time format for all Toast APIs.</a>\n"
            format: date-time
            type: string
          voidBusinessDate:
            description: "The business date (yyyyMMdd) on which this selection was\
              \ \nvoided.\n"
            type: integer
          voidReason:
            $ref: "#/components/schemas/ExternalReference"
          displayName:
            description: "The display name of the selection. This field can be used\
              \ to set a special request value, otherwise it will be generated from\
              \ the `item` property of this `Selection`."
            type: string
          createdDate:
            description: "The date on which this selection was created. Defaults to\
              \ \ncurrent time if not specified. <a \nhref=\"https://doc.toasttab.com/doc/devguide/api_dates_and_timestamps.html\"\
              >Use \nISO 8601 date and time format for all Toast APIs.</a>\n"
            format: date-time
            type: string
          modifiedDate:
            description: "The date on which this selection was last modified. \nDefaults\
              \ to current time if not specified. <a \nhref=\"https://doc.toasttab.com/doc/devguide/api_dates_and_timestamps.html\"\
              >Use \nISO 8601 date and time format for all Toast APIs.</a>\n"
            format: date-time
            type: string
          modifiers:
            description: A list of modifiers applying to this selection.
            items:
              $ref: "#/components/schemas/Selection"
            type: array
          fulfillmentStatus:
            default: NEW
            description: "Indicates the stage of the preparation workflow that the\
              \ \nmenu item selection is in. The `fulfillmentStatus` of a \nmenu item\
              \ selection changes as restaurant employees move \nthe item through\
              \ the functions of the Toast POS system, for \nexample order entry and\
              \ the kitchen display system (KDS).\nResponse only. \n<ul>\n  <li>`NEW`\
              \ - the menu item selection has been added to a \n    check but has\
              \ not been sent to the KDS for \n    preparation.</li>\n  <li>`HOLD`\
              \ - a restaurant employee has paused the menu \n    item selection so\
              \ that it does not appear in the \n    KDS for preparation.</li>\n \
              \ <li>`SENT` - the menu item selection has been fired and \n    appears\
              \ in the KDS for preparation.</li>\n  <li>`READY` - preparation is complete,\
              \ the menu item \n    selection has been fulfilled and no longer appears\
              \ in \n    the KDS. If your restaurant does not use the Toast POS \n\
              \    KDS, items in an order will not reach the `READY` \n    status.</li>\n\
              </ul>\n"
            enum:
            - NEW
            - HOLD
            - SENT
            - READY
            type: string
          taxInclusion:
            description: |
              Indicates whether the menu item price includes one or more tax
              amounts. If the menu item is a modifier for another menu item
              selection, it always inherits the tax inclusion behavior of the menu
              item it applies to. Values are:
              * `INCLUDED` - the menu item price includes one or more tax amounts.
              * `NOT_INCLUDED` - the menu item price does not include any tax
                amounts.
              * `INHERITED` - the menu item is a modifier for another menu item
                selection in the check. The `taxInclusion` value of the parent menu
                item selection applies to the modifier. If a menu item selection
                *that is not a modifier* inherits tax inclusion behavior from a
                menu or menu group, the `taxInclusion` value will be either
                `INCLUDED` or `NOT_INCLUDED`.
            enum:
            - INCLUDED
            - NOT_INCLUDED
            - INHERITED
            type: string
          appliedTaxes:
            description: An array of `AppliedTaxRate` objects that contain information
              about tax payments made for the selection.
            items:
              $ref: "#/components/schemas/AppliedTaxRate"
            type: array
        required:
        - item
        - quantity
        type: object
      description: |
        "A `Selection` object can represent either a primary item (i.e. `Check.selections`) or a modifier (`Selection.modifiers`) selection. Quantity defaults to 1.
        <br><br>
        Specify a modifier selection by adding it to the `modifiers` list of another selection. For each modifier selection, its `optionGroup` field must be set correctly, because a `MenuItem` can be included in multiple `MenuOptionGroups`, potentially with different prices or sizing.

              >Use \nISO 8601 date and time format for all Toast APIs.</a>\n"
            format: date-time
            type: string
          modifiedDate:
            description: "The most recent date on which this check was modified. <a\
              \ \nhref=\"https://doc.toasttab.com/doc/devguide/api_dates_and_timestamps.html\"\
              >Use \nISO 8601 date and time format for all Toast APIs.</a>\n"
            format: date-time
            type: string
          deletedDate:
            description: "The date on which this check was deleted. `deletedDate`\
              \ \nis only applicable when deleted is true (by default the \nvalue\
              \ will be set to 1970-01-01T00:00:00.000+0000). <a \nhref=\"https://doc.toasttab.com/doc/devguide/api_dates_and_timestamps.html\"\
              >Use \nISO 8601 date and time format for all Toast APIs.</a>\n"
            format: date-time
            type: string
          deleted:
            description: True if this check has been deleted.
            type: boolean
          selections:
            items:
              $ref: "#/components/schemas/Selection"
            type: array
          customer:
            $ref: "#/components/schemas/Customer"
          appliedLoyaltyInfo:

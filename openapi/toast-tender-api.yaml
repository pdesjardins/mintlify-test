    Payment:
      allOf:
      - $ref: "#/components/schemas/ExternalReference"
      - properties:
          paidDate:
            description: "The date on which the payment was made. <a \nhref=\"https://doc.toasttab.com/doc/devguide/api_dates_and_timestamps.html\"\
              >Use \nISO 8601 date and time format for all Toast APIs.</a>\n"
            format: date-time
            type: string
          paidBusinessDate:
            description: "The business date (yyyyMMdd) on which this payment was \n\
              first applied.\n"
            type: integer
          type:
            description: The payment method.
            enum:
            - CASH
            - CREDIT
            - GIFTCARD
            - HOUSE_ACCOUNT
            - REWARDCARD
            - LEVELUP
            - TENDER
            - OTHER
            - UNDETERMINED
            type: string
          cardEntryMode:
            description: Indicates how credit card data was obtained.
            enum:
            - SWIPED
            - KEYED
            - ONLINE
            - EMV_CHIP_SIGN
            - TOKENIZED
            - PRE_AUTHED
            - SAVED_CARD
            - FUTURE_ORDER
            type: string
          amount:
            description: "The amount of this payment, excluding tips."
            format: double
            type: number
          tipAmount:
            description: The amount tipped on this payment.
            format: double
            type: number
          amountTendered:
            description: The amount tendered for this payment.
            format: double
            type: number
          cardType:
            description: The type of card used.
            enum:
            - VISA
            - MASTERCARD
            - AMEX
            - DISCOVER
            - JCB
            - DINERS
            - CIT
            - MAESTRO
            - LASER
            - SOLO
            - UNKNOWN
            type: string
          last4Digits:
            description: The last 4 digits of the card used.
            type: string
          originalProcessingFee:
            description: The original processing fee for this payment. The original
              processing fee value is populated after the payment has been captured.
            format: double
            type: number
          cashDrawer:
            $ref: "#/components/schemas/ExternalReference"
          refundStatus:
            enum:
            - NONE
            - PARTIAL
            - FULL
            type: string
          refund:
            $ref: "#/components/schemas/Refund"
          paymentStatus:
            description: The status of this payment when the type is CREDIT.
            enum:
            - OPEN
            - PROCESSING
            - AUTHORIZED_AT_RISK
            - AUTHORIZED
            - ERROR
            - DENIED
            - VOIDED_AT_RISK
            - CANCELLED
            - CAPTURE_IN_PROGRESS
            - CAPTURED
            - VOIDED
            type: string
          voidInfo:
            $ref: "#/components/schemas/VoidInformation"
          houseAccount:
            $ref: "#/components/schemas/ExternalReference"
          otherPayment:
            $ref: "#/components/schemas/ExternalReference"
          createdDevice:
            $ref: "#/components/schemas/Device"
          lastModifiedDevice:
            $ref: "#/components/schemas/Device"
          mcaRepaymentAmount:
            description: |
              The total currency amount withheld as repayment for a merchant
              cash advance (MCA). The MCA repayment amount is set at the time
              the payment is captured, and then updated when settlement occurs.
            format: double
            type: number
        required:
        - amount
        - tipAmount
        - type
        type: object

            $ref: "#/components/schemas/ConfigReference"
          optionGroup:
            $ref: "#/components/schemas/ConfigReference"
          preModifier:
            $ref: "#/components/schemas/ConfigReference"
          quantity:
            description: Quantity ordered. A decimal number for items sold by weight;
              a counting number for discrete items.
            format: double
            type: number
          unitOfMeasure:
            description: "The unit of measure required for weighing the item. Default\
              \ is NONE, which means the item is not meant to be weighed."
            enum:
            - NONE
            - LB
            - OZ
            - KG
            - G
            type: string
          selectionType:
            description: "Specifies whether this selection is a special request or\
              \ other off-menu sale. If left null or NONE, describes a normal modifier\
              \ or item selection."
            enum:
            - NONE
            - OPEN_ITEM
            - SPECIAL_REQUEST
            - PORTION
            - HOUSE_ACCOUNT_PAY_BALANCE
            type: string

openapi: 3.0.1
info:
  contact:
    name: Toast API Support
  description: "This API specification describes the interface that the Toast POS\
    \ \nsystem will call when it processes loyalty transactions.\n\nImplement this\
    \ REST API to allow the Toast POS system to process \nloyalty transactions using\
    \ a loyalty provider that it does not \ncurrently support.\n"
  title: Toast Loyalty Integration API
  version: 1.1.0
servers:
- url: https://toast-api-server/yourapiname/v1
paths:
  /yourendpointname:
    post:
      description: "Provides information about a loyalty transaction processed by\
        \ \nthe Toast platform. The transaction information in the \nmessage body\
        \ is intended to allow a loyalty provider to \nperform corresponding operations\
        \ on the loyalty account, \nmaintained by that provider.\n\nYou define the\
        \ endpoint name for this implementation. The Toast \nPOS system makes requests\
        \ to the REST path that you supply \nduring integration setup.\n\nEach `POST`\
        \ request to the endpoint includes a \n`Toast-Transaction-Type` header parameter\
        \ value to indicate the \ntype of loyalty transaction it represents. The possible\
        \ \ntransaction types are:\n\n* Inquire to get information about a given loyalty\
        \ account\n  given the items currently on the check.\n* Search for a loyalty\
        \ account.\n* Redeem offers.\n* Accrue rewards based on a given check.\n*\
        \ Reverse a previous redeem or accrue transaction.\n\nThe `LoyaltyTransaction`\
        \ \nobject in the message body includes a set of information that \nis specific\
        \ for each transaction type.\n\nThe response time for a loyalty transaction\
        \ request must be \nless than 500ms on average. A response time of greater\
        \ than\n5000ms will be considered a timeout and will be retried. There\nis\
        \ a limit on the number of retries which depends on the context\nof the call.\n\
        \nAll loyalty transactions must be considered idempotent. The \nimplementation\
        \ must handle multiple requests with the same \n`Toast-Transaction-GUID` *and*\
        \ the same `loyaltyIdentifier`.\n"
      operationId: yourEndpointNamePost
      parameters:
      - description: "A unique identifier of the loyalty transaction, defined \nby\
          \ the Toast POS system.\n"
        in: header
        name: Toast-Transaction-GUID
        schema:
          type: string
      - description: "The unique identifier of the restaurant, defined by the \nToast\
          \ POS system.\n"
        in: header
        name: Toast-Restaurant-External-ID
        schema:
          type: string
      - description: |
          The type of loyalty transaction that occurred. Values are:
          <ul>
            <li>LOYALTY_INQUIRE</li>
            <li>LOYALTY_SEARCH</li>
            <li>LOYALTY_REDEEM</li>
            <li>LOYALTY_ACCRUE</li>
            <li>LOYALTY_REVERSE</li>
            <li>LOYALTY_TRANSFER</li>
          </ul>
        in: header
        name: Toast-Transaction-Type
        schema:
          enum:
          - LOYALTY_INQUIRE
          - LOYALTY_SEARCH
          - LOYALTY_REDEEM
          - LOYALTY_ACCRUE
          - LOYALTY_REVERSE
          - LOYALTY_TRANSFER
          type: string
      - description: "A JSON Web Token (JWT) that you can use to authenticate the\
          \ request. \nVerify the token using the public key that you get from the\
          \ Toast user management service.\n"
        in: header
        name: Authorization
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoyaltyTransaction"
        description: "A `LoyaltyTransaction` \nobject containing information about\
          \ the loyalty \ntransaction that the Toast POS system processed.\n"
        required: false
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoyaltyTransactionResponse"
          description: "OK. The `transactionStatus` value of the \n`LoyaltyTransactionResponse`\
            \ object is `ACCEPT`.\n"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoyaltyTransactionResponse"
          description: "Bad request. The `transactionStatus` value of the \n`LoyaltyTransactionResponse`\
            \ object is one of: \n\n* `ERROR_INVALID_TOAST_TRANSACTION_TYPE`\n* `ERROR_ACCOUNT_INVALID`\n\
            * `ERROR_INVALID_INPUT_PROPERTIES`\n* `ERROR_TRANSACTION_DOES_NOT_EXIST`\n\
            * `ERROR_INVALID_TOKEN`\n* `ERROR_TRANSACTION_CANNOT_BE_REVERSED`\n* `ERROR_INVALID_RESTAURANT`\n"
        "500":
          content: {}
          description: Internal server error.
      summary: |
        Provide information on a loyalty transaction
      x-codegen-request-body-name: loyaltyTransaction
components:
  schemas:
    LoyaltyTransaction:
      description: "Information about a loyalty transaction in the Toast POS \nsystem.\
        \ Loyalty providers are expected to handle that \ntransaction.\n\nThe set\
        \ of information in this object depends on the loyalty \ntransaction type.\
        \ The transaction type is specified in the \n`Toast-Transaction-Type` header\
        \ parameter for the request, \nand within the body of the request.\n\nThe\
        \ `LoyaltyTransaction` object includes the `toastTransactionType`\nvalue,\
        \ which will be the same as the value in the header. It will also\ninclude\
        \ one of the following values depending on the transaction type:\n\n* `LOYALTY_INQUIRE`\
        \ - checkTransactionInformation\n* `LOYALTY_SEARCH` - searchTransactionInformation\n\
        * `LOYALTY_REDEEM` - checkTransactionInformation\n* `LOYALTY_ACCRUE` - checkTransactionInformation\n\
        * `LOYALTY_REVERSE` - reverseTransactionInformation\n* `LOYALTY_TRANSFER`\
        \ - transferTransactionInformation\n"

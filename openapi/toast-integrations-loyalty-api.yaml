        loyaltyIdentifier: loyaltyIdentifier
      properties:
        loyaltyIdentifier:
          description: Unique identifier of the loyalty account. Format will vary
            by provider.
          type: string
        orderGuid:
          description: The Toast POS system identifier for the order that contains
            the check.
          type: string
        check:
          $ref: "#/components/schemas/Check"
        redemptions:
          description: |
            List of offers to be redeemed, or already redeemed on a check. If this is the
            first time this particular Redemption has been present in a request (as part of
            this customer interaction), it will be present in this list but not on the Check.
            If a Redemption has been previously validated, it will be present both in this list
            and on the Check as an `AppliedDiscount`.
          items:
            $ref: "#/components/schemas/Redemption"
          type: array
      type: object
    TransactionInformationReverse:
      description: |
        Information needed to complete a reverse transaction. Included if the toastTransactionType is
        LOYALTY_REVERSE, absent otherwise.
      example:
        redemptions:
        - identifier: identifier
          amount: 5.962133916683182
          multiItemDiscountGuid: multiItemDiscountGuid
          quantity: 5.637376656633329
          appliedDiscountGuid: appliedDiscountGuid
          selectionGuid: selectionGuid
          itemApplication:
          - appliedDiscountIdentifier: "{}"
            amount: 0.8008281904610115
            selectionIdentifier: selectionIdentifier
          - appliedDiscountIdentifier: "{}"
            amount: 0.8008281904610115
            selectionIdentifier: selectionIdentifier
        - identifier: identifier
          amount: 5.962133916683182
          multiItemDiscountGuid: multiItemDiscountGuid
          quantity: 5.637376656633329
          appliedDiscountGuid: appliedDiscountGuid
          selectionGuid: selectionGuid
          itemApplication:
          - appliedDiscountIdentifier: "{}"
            amount: 0.8008281904610115
            selectionIdentifier: selectionIdentifier
          - appliedDiscountIdentifier: "{}"
            amount: 0.8008281904610115
            selectionIdentifier: selectionIdentifier
        transactionId: transactionId
        loyaltyIdentifier: loyaltyIdentifier
      properties:
        loyaltyIdentifier:
          description: Unique identifier of the loyalty account. Format will vary
            by provider.
          type: string
        transactionId:
          description: Id of a previous transaction to reverse.
          type: string
        redemptions:
          description: "If the transaction to be reversed was a LOYALTY_REDEEM transaction,\
            \ this array optional includes the list of redemptions from that transaction\
            \ to reverse. If this field is absent, all redemptions from the transaction\
            \ should be reversed."
          items:
            $ref: "#/components/schemas/Redemption"
          type: array
      type: object
    TransactionInformationTransfer:
      description: |
        Information needed to complete a transfer transaction. Included if the toastTransactionType is
        LOYALTY_TRANSFER, absent otherwise.
      example:
        fromLoyaltyIdentifier: fromLoyaltyIdentifier
        toLoyaltyIdentifier: toLoyaltyIdentifier
      properties:
        fromLoyaltyIdentifier:
          description: Unique identifier of the current loyalty account. Format will
            vary by provider.
          type: string
        toLoyaltyIdentifier:
          description: Unique identifier of the loyalty account that the user wants
            to transfer to. Format will vary by provider.
          type: string
      type: object
    AccountSearchCriteria:
      description: "A set of possible criteria to be used to search for a given loyalty\
        \ account. The provider\nmust return a list of loyalty accounts that match\
        \ the criteria given so the customer can\nselect the correct one. All of the\
        \ fields are optional, though at least one will be \npopulated.\n"
      example:
        firstName: firstName
        lastName: lastName
        phone: phone
        email: email
      properties:
        firstName:
          description: The first or given name of the customer attached to the loyalty
            account.
          type: string
        lastName:
          description: The last or family name of the customer attached to the loyalty
            account.
          type: string
        email:
          description: An email address for the customer attached to the loyalty account.
          type: string
        phone:
          description: |
            A telephone number for the customer attached to the loyalty account. This number
            will be ten digits with no other characters.
          type: string
      type: object
    Redemption:
      description: |
        Information about an offer to be redeemed (or that was redeemed) to a check.
      example:
        identifier: identifier
        amount: 5.962133916683182
        multiItemDiscountGuid: multiItemDiscountGuid
        quantity: 5.637376656633329
        appliedDiscountGuid: appliedDiscountGuid
        selectionGuid: selectionGuid
        itemApplication:
        - appliedDiscountIdentifier: "{}"
          amount: 0.8008281904610115
          selectionIdentifier: selectionIdentifier
        - appliedDiscountIdentifier: "{}"
          amount: 0.8008281904610115
          selectionIdentifier: selectionIdentifier
      properties:
        identifier:
          description: "Identifier of the `Offer` to be redeemed. The \nOffer must\
            \ be one that was returned by the provider in response to an inquiry\n\
            request.\n"
          type: string
        selectionGuid:
          description: |
            If this is an item level discount, the guid of the selection that this redemption is
            attached to. If this redemption has not been added to a specific selection yet, this
            field will be absent.
          type: string
        appliedDiscountGuid:
          description: "The GUID of the `AppliedDiscount` on the `Check` or `Selection`\
            \ object corresponding to the discount.\nThis is required if the `Redemption`\
            \ object is contained within the `RejectionRedemption` \nobject and identifies\
            \ the rejected redemption.\nThis is included to differentiate if multiple\
            \ redemptions of the same type are applied to the\nsame check or item.\n"
          type: string
        multiItemDiscountGuid:
          description: |
            The GUID of a Multi Item Redemption. A Multi Item Redemption is a single loyalty redemption that applied to
            multiple items on the check. For instance, a "$3 off burgers, $2 off fries, and $1 off a drink" would be a
            single loyalty redemption that applies to 3 separate items. This field is an identifier for a Multi Item
            redemption, but does not correspond to any one object on the `Check`. To see what items were discounted,
            refer to the `itemApplication` field.
          type: string
        amount:
          description: |
            The dollar (or other currency) amount that this offer actually discounts.
          type: number
        itemApplication:
          description: |
            If this offer this object is redeeming is of type MULTI_ITEM, this array includes the selections
            to which the offer has been applied, along with the amounts applied to each selection and the identifier
            of the discounts applied to each selection. If this field is present, the `selectionGuid`,
            `appliedDiscountGuid`, and `amount` fields will be null, as the values in this array convey that
            information.
          items:
            $ref: "#/components/schemas/ItemRedemptionInfo"
          type: array
        quantity:
          description: |
            The number of times the offer has been applied to the item or check. For example, if an offer is
            a stackable "$5 off check" discount, this field could indicate that multiple copies of that offer
            have been applied.
          type: number
      type: object
    RejectedRedemption:
      description: |
        A redemption that was included in a list of redemptions to redeem, but is not valid
        based on the partner's validation logic.
      example:
        redemption:
          identifier: identifier
          amount: 5.962133916683182
          multiItemDiscountGuid: multiItemDiscountGuid
          quantity: 5.637376656633329
          appliedDiscountGuid: appliedDiscountGuid
          selectionGuid: selectionGuid
          itemApplication:
          - appliedDiscountIdentifier: "{}"
            amount: 0.8008281904610115
            selectionIdentifier: selectionIdentifier
          - appliedDiscountIdentifier: "{}"
            amount: 0.8008281904610115
            selectionIdentifier: selectionIdentifier
        message: message
      properties:
        redemption:
          $ref: "#/components/schemas/Redemption"
        message:
          description: An explanation of why the discount was rejected.
          type: string
      required:
      - redemption
      type: object
    AccountInfo:
      description: |
        Identifying information about a specific loyalty account.
      example:
        identifier: identifier
        firstName: firstName
        lastName: lastName
        phone: phone
        pointsBalance: pointsBalance
        email: email
      properties:
        identifier:
          description: A unique identifer for this account.
          type: string
        firstName:
          description: First or given name of the account holder
          type: string
        lastName:
          description: Last or family name of the account holder
          type: string
        phone:
          description: Phone number of the account holder
          type: string
        email:
          description: Email address of the account holder
          type: string
        pointsBalance:
          description: "If the loyalty program tracks points, use this field to report\
            \ the \ncurrent points available to the account owner. This field only\
            \ displays on \nthe POS in `LOYALTY_INQUIRE` workflows. If absent, no\
            \ value is displayed. Optional.\n"
          type: string
      type: object
    Offer:
      description: "Information about a potential discount or other benefit available\
        \ to the holder of \na loyalty account. Contrast with a `Redemption`,\nwhich\
        \ is an Offer that is applied to a `Check`.\n"
      example:
        identifier: identifier
        selectionType: CHECK
        amount: 6.027456183070403
        quantity: 1.4658129805029452
        name: name
        applicable: true
        expiration:
        - date: 2000-01-23T04:56:07.000+00:00
          quantity: "{}"
        - date: 2000-01-23T04:56:07.000+00:00
          quantity: "{}"
        itemApplication:
        - appliedDiscountIdentifier: "{}"
          amount: 0.8008281904610115
          selectionIdentifier: selectionIdentifier
        - appliedDiscountIdentifier: "{}"
          amount: 0.8008281904610115
          selectionIdentifier: selectionIdentifier
      properties:
        identifier:
          description: |
            A unique identifier for this offer. Each offer must have a unique
            identifier. The Toast platform will not apply discounts correctly if
            your integration uses an identifier for more than one offer on a
            check.
          type: string
        name:
          description: |
            The name of this discount. This should be a human readable description of the order.
            Examples include "5% off your entire order" or "Free small cheese pizza".
          type: string
        applicable:
          description: |
            true if this offer can be applied to the check submitted with the request,
            false otherwise
          type: boolean
        selectionType:
          description: "Describes what this offer covers. A `CHECK` level discount\
            \ applies to the entire\ncheck, without requirements on the items contained\
            \ within the check. An `ITEM` \nlevel discount applies to a specific item\
            \ on the check. \n"
          enum:
          - CHECK
          - ITEM
          - MULTI_ITEM
          type: string
        itemApplication:
          description: |
            If this offer is of type ITEM or MULTI_ITEM, this array includes the selection or selections
            to which the offer can be applied. Required if applicable is true, optional otherwise.
          items:
            $ref: "#/components/schemas/ItemRedemptionInfo"
          type: array
        amount:
          description: |
            The currency amount of the discount when applied based on the current check information.
            This value can be updated in future calls based on updated check information (for example,
            a 10% off offer will change based on the check total). This field is optional in response to
            LOYALTY_INQUIRE requests and required in response to LOYALTY_REDEEM requests. If the selection type
            is ITEM or MULTI_ITEM, this amount should be the sum of the amounts on each ItemRedemptionInfo in
            the itemApplication array.
          type: number
        quantity:
          description: |
            The quantity of this reward available to the account owner. This is informational to display to the
            user. It does not necessarily mean the offer is redeemable multiple times (for example, a guest may
            have two "10% off your entire check" offers, but only one can be redeemed per visit).
          type: number
        expiration:
          description: "If this offer will expire, expiration dates can be included\
            \ in this element to indicate on which date(s) this offer will expire.\
            \ The next upcoming expiration date will be displayed for the offer on\
            \ the POS. Optional."
          items:
            $ref: "#/components/schemas/ExpirationData"
          type: array
      type: object
    ItemRedemptionInfo:
      description: Information about the application of a `Redemption` to a specific
        item.
      example:
        appliedDiscountIdentifier: "{}"
        amount: 0.8008281904610115
        selectionIdentifier: selectionIdentifier
      properties:
        selectionIdentifier:
          description: |
            The identifier of the selection that discount is applied to. This will correspond to the `guid`
            field on the `Selection` object that is included with the `Check`. Toast uses these values to determine
            which item(s) will have the offer applied.
          type: string
        amount:
          description: |
            The currency amount of the discount applied to this item. This value can be updated in future calls.
            This field is optional in response to LOYALTY_INQUIRE requests and required in response to LOYALTY_REDEEM requests.
          type: number
        appliedDiscountIdentifier:
          description: |
            If this redemption has been applied, this is the identifier of the applied discount created for this offer
            on this selection. It will correspond to the `guid` field of the `AppliedDiscount` object on the Selection.
            Response only.
          type: object
      type: object
    ExpirationData:
      description: "If an offer will expire, this can detail information of when that\
        \ offer is set to expire."
      example:
        date: 2000-01-23T04:56:07.000+00:00
        quantity: "{}"
      properties:
        date:
          description: "The date at which the offer will expire. Optional. <a\nhref=\"\
            https://dev.toasttab.com/Ie5QH/api_dates_and_timestamps.html\">Use \n\
            ISO 8601 date and time format for all Toast APIs.</a>\n"
          format: date-time
          type: string
        quantity:
          description: The quantity of the offer that will expire at the expiration
            date. If not present assumes the entire offer will expire at the expiration
            date. Optional.
          format: number
          type: object
      type: object
    Check:
      allOf:
      - $ref: "#/components/schemas/ExternalReference"
      - properties:
          openedDate:
            description: "The date at which this check was opened. <a \nhref=\"https://dev.toasttab.com/Ie5QH/api_dates_and_timestamps.html\"\
              >Use \nISO 8601 date and time format for all Toast APIs.</a>\n"
            format: date-time
            type: string
          closedDate:
            description: "The most recent date at which this check's payment status\
              \ \nwas set to CLOSED. <a \nhref=\"https://dev.toasttab.com/Ie5QH/api_dates_and_timestamps.html\"\
              >Use \nISO 8601 date and time format for all Toast APIs.</a>\n"
            format: date-time
            type: string
          modifiedDate:
            description: "The most recent date at which this check was modified. <a\
              \ \nhref=\"https://dev.toasttab.com/Ie5QH/api_dates_and_timestamps.html\"\
              >Use \nISO 8601 date and time format for all Toast APIs.</a>\n"
            format: date-time
            type: string
          deletedDate:
            description: "The date at which this check was deleted. `deletedDate`\
              \ \nis only applicable when deleted is true (by default the \nvalue\
              \ will be set to 1970-01-01T00:00:00.000+0000). <a \nhref=\"https://dev.toasttab.com/Ie5QH/api_dates_and_timestamps.html\"\
              >Use \nISO 8601 date and time format for all Toast APIs.</a>\n"
            format: date-time
            type: string
          deleted:
            description: True if this check has been deleted.
            type: boolean
          selections:
            items:
              $ref: "#/components/schemas/Selection"
            type: array
          appliedLoyaltyInfo:
            $ref: "#/components/schemas/AppliedLoyaltyInfo"
          taxExempt:
            default: false
            description: True if this check is tax exempt. Tax exempt number is not
              yet supported.
            type: boolean
          displayNumber:
            description: Generally starts at one each day and counts up. Not guaranteed
              to be unique.
            type: string
          appliedServiceCharges:
            description: Any restaurant-configured service charges that applied to
              this check.
            items:
              $ref: "#/components/schemas/AppliedServiceCharge"
            type: array
          amount:
            description: "The dollar amount due on this check in USD, after discounts\
              \ but before tax."
            format: double
            type: number
          taxAmount:
            description: The computed tax amount in USD. Includes service charge and
              item level taxes.
            format: double
            type: number
          totalAmount:
            description: "The total amount due on this check in USD, including discounts\
              \ and taxes."
            format: double
            type: number
          payments:
            description: Payments made on this check
            items:
              $ref: "#/components/schemas/Payment"
            minItems: 0
            type: array
          tabName:
            description: The name of the tab on this check. This will show up on the
              KDS (Kitchen Display System) for pending orders. The tabName's length
              can be up to 255 characters.
            type: string
          paymentStatus:
            description: The payment status of this check. OPEN means there is outstanding
              balance. PAID means a credit card payment has been applied but the tip
              has not been adjusted. CLOSED means there is no remaining amount due
              on this check. Toast does not prevent a CLOSED check from transitioning
              back to OPEN or PAID.
            enum:
            - OPEN
            - PAID
            - CLOSED
            type: string
          appliedDiscounts:
            description: The discounts applied to this check.
            items:
              $ref: "#/components/schemas/AppliedDiscount"
            minItems: 0
            type: array
          voided:
            description: True if this check has been voided.
            type: boolean
          voidDate:
            description: "The date at which this check was voided. <a \nhref=\"https://dev.toasttab.com/Ie5QH/api_dates_and_timestamps.html\"\
              >Use \nISO 8601 date and time format for all Toast APIs.</a>\n"
            format: date-time
            type: string
          voidBusinessDate:
            description: "The business date (yyyyMMdd) on which this check was \n\
              voided.\n"
            type: integer
          paidDate:
            description: "The most recent date at which this check received \npayment.\
              \ <a \nhref=\"https://dev.toasttab.com/Ie5QH/api_dates_and_timestamps.html\"\
              >Use \nISO 8601 date and time format for all Toast APIs.</a>\n"
            format: date-time
            type: string
          createdDevice:
            $ref: "#/components/schemas/Device"
          lastModifiedDevice:
            $ref: "#/components/schemas/Device"
